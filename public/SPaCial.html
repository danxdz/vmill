<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SPaCial</title>
  <style>
    :root{
      --bg:var(--vm-theme-bg, #0a1018);
      --panel:var(--vm-theme-panel, #111b2b);
      --panel2:var(--vm-theme-panel-2, #0e1726);
      --text:var(--vm-theme-text, #e8edf7);
      --muted:var(--vm-theme-muted, rgba(232,237,247,.66));
      --border:var(--vm-theme-border, rgba(232,237,247,.2));
      --accent:var(--vm-theme-accent, #59b8ff);
      --accent-rgb:var(--vm-theme-accent-rgb, 89,184,255);
      --warn:var(--vm-theme-warn, #ffd37a);
      --bad:var(--vm-theme-danger, #ff6a7f);
      --ok:var(--vm-theme-ok, #68d398);
    }
    *{box-sizing:border-box;}
    html,body{
      height:auto;
      min-height:100%;
    }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:radial-gradient(800px 380px at 0 -10%, rgba(var(--accent-rgb),.16), transparent 60%), var(--bg);
      color:var(--text);
      min-height:100dvh;
      overflow-x:hidden;
      overflow-y:auto;
      display:block;
    }
    .wrap{
      width:100%;
      max-width:none;
      margin:0;
      padding:12px 14px;
      min-height:0;
      display:block;
      gap:0;
    }
    .head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px;}
    .sub{color:var(--muted);font-size:13px;margin-top:6px;}
    .card{
      border:1px solid var(--border);
      border-radius:14px;
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      padding:12px;
      flex:0 0 auto;
      min-height:0;
      display:block;
    }
    .controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;}
    #scopeTypeSel,#scopeItemSel{display:none !important;}
    body.hubScopeOnly .controls .moduleLocalScope{display:none !important;}
    @media(max-width:980px){.controls{grid-template-columns:1fr;}}
    select,input,textarea,button{
      width:100%;
      padding:9px 10px;
      border-radius:10px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      color:var(--text);
    }
    button{cursor:pointer;font-weight:600;}
    button.primary{
      border-color:color-mix(in srgb,var(--accent) 55%, transparent);
      background:color-mix(in srgb,var(--accent) 14%, transparent);
      color:var(--text);
    }
    button.warn{
      border-color:color-mix(in srgb,var(--warn) 55%, transparent);
      background:color-mix(in srgb,var(--warn) 16%, transparent);
      color:var(--text);
    }
    button.danger{
      border-color:color-mix(in srgb,var(--bad) 55%, transparent);
      background:color-mix(in srgb,var(--bad) 14%, transparent);
      color:var(--text);
    }
    .chartBox{
      margin-top:10px;border:1px solid var(--border);border-radius:10px;padding:10px;
      background:color-mix(in srgb,var(--panel2) 86%, var(--bg));
      flex:0 0 auto;
      min-height:0;
      display:block;
    }
    .chartTitle{font-size:12px;color:var(--muted);margin-bottom:8px;}
    .section{
      margin-top:10px;
      border:1px solid color-mix(in srgb,var(--text) 10%, transparent);
      border-radius:10px;
      background:color-mix(in srgb,var(--panel2) 86%, transparent);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .section > summary{
      list-style:none;
      cursor:pointer;
      padding:10px 12px;
      font-size:12px;
      font-weight:700;
      color:var(--text);
      border-bottom:1px solid color-mix(in srgb,var(--text) 10%, transparent);
      background:color-mix(in srgb,var(--panel3,var(--panel2)) 78%, transparent);
    }
    .section > summary::-webkit-details-marker{display:none;}
    .sectionBody{padding:10px;}
    .chartBox > .section:last-of-type{flex:0 0 auto;}
    canvas{width:100%;height:auto;display:block;}
    .mini{font-size:11px;color:var(--muted);}
    .bad{color:var(--bad);}
    .ok{color:var(--ok);}
    .routeGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;}
    @media(max-width:980px){.routeGrid{grid-template-columns:repeat(2,minmax(0,1fr));}}
    .routeGrid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;}
    @media(max-width:980px){.routeGrid3{grid-template-columns:1fr;}}
    .routeTools{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
    .routeTools > *{flex:1 1 140px;}
    .actions{display:flex;gap:6px;flex-wrap:wrap;}
    .tableWrap{
      margin-top:8px;
      border:1px solid var(--border);
      border-radius:10px;
      overflow:auto;
      max-height:52dvh;
      min-height:180px;
      flex:0 0 auto;
      background:color-mix(in srgb,var(--panel2) 90%, transparent);
    }
    .tbl{
      width:100%;
      border-collapse:collapse;
      min-width:520px;
      font-size:12px;
    }
    .tbl th,.tbl td{
      border-bottom:1px solid color-mix(in srgb,var(--text) 10%, transparent);
      padding:7px 8px;
      text-align:left;
      vertical-align:top;
    }
    .tbl th{
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.04em;
      position:sticky;
      top:0;
      background:color-mix(in srgb,var(--panel) 94%, transparent);
      z-index:1;
    }
    .tbl tr:last-child td{border-bottom:0;}
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:11px;
    }
    .canvasWrap{
      margin-top:8px;
      border:1px solid var(--border);
      border-radius:10px;
      overflow:auto;
      background:color-mix(in srgb,var(--panel2) 92%, transparent);
      flex:0 0 auto;
      min-height:320px;
      max-height:72dvh;
    }
    #bubbleCanvas{
      display:block;
      width:100%;
      height:auto;
      cursor:crosshair;
      background:color-mix(in srgb,var(--panel) 92%, transparent);
    }
    .inlineCheck{
      width:auto;
      padding:0;
      margin:0;
    }
    .tbl tr.sel td{
      background:color-mix(in srgb,var(--accent) 16%, transparent);
    }
    .specCell{
      white-space:nowrap;
      color:color-mix(in srgb,var(--text) 85%, transparent);
      font-size:11px;
    }
    .annIdCell{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .annThumb{
      width:34px;
      height:34px;
      border-radius:8px;
      border:1px solid color-mix(in srgb,var(--text) 16%, transparent);
      object-fit:cover;
      flex:0 0 auto;
      background:color-mix(in srgb,var(--panel) 84%, transparent);
    }
    @media(max-width:760px){
      .wrap{
        padding:8px;
      }
      .head{
        margin-bottom:8px;
      }
      .head h1{
        font-size:24px;
      }
      .sub{
        font-size:12px;
      }
      .card{
        padding:10px;
        border-radius:12px;
      }
      .controls{
        grid-template-columns:1fr;
        gap:6px;
      }
      .routeGrid{
        grid-template-columns:1fr;
      }
      .routeTools{
        gap:6px;
      }
      .routeTools > *{
        flex:1 1 100%;
      }
      .tableWrap{
        max-height:46dvh;
        min-height:160px;
      }
      .tbl{
        min-width:420px;
        font-size:11px;
      }
      .canvasWrap{
        min-height:260px;
        max-height:58dvh;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h1 id="spacialTitle" style="margin:0;">SPaCial</h1>
        <div class="sub" id="spacialSubtitle">Dimensional control and blueprint annotation planning.</div>
      </div>
    </div>
    <section class="card">
      <div class="controls">
        <select id="scopeTypeSel"></select>
        <select id="scopeItemSel"></select>
        <select id="productFilterSel" class="moduleLocalScope"></select>
        <select id="stationFilterSel" class="moduleLocalScope"></select>
        <select id="jobSel" class="moduleLocalScope"></select>
        <select id="routeSel"></select>
        <button class="primary" id="routeNewBtn" type="button">+ Route</button>
        <button id="routeDupBtn" type="button">Duplicate Route</button>
        <button class="danger" id="routeDeleteBtn" type="button">Delete Route</button>
      </div>
      <div class="mini" id="stateInfo" style="margin-top:8px;"></div>
      <div class="chartBox" style="margin-top:10px;">
        <div id="routingTitle" style="font-weight:700;">Routing and Dimensional Control</div>
        <div class="mini" id="routeInfo" style="margin-top:8px;"></div>

        <details class="section" open>
          <summary id="sectionRouteSummary">Route</summary>
          <div class="sectionBody">
            <div class="routeGrid" style="margin-top:2px;">
              <input id="routeNameIn" type="text" placeholder="Route name" />
              <input id="routeRevisionIn" type="text" placeholder="Revision (A, B...)" />
              <input id="routeProductRefIn" type="text" placeholder="Product / Drawing ref" />
              <button id="routeSaveBtn" class="primary" type="button">Save Route</button>
            </div>
            <div class="routeTools">
              <button id="routeResetBtn" type="button">Reload</button>
              <button id="routeExportJsonBtn" type="button">Route JSON</button>
              <button id="routeExportCsvBtn" type="button">Route CSV</button>
              <button id="routeExportPdfBtn" class="warn" type="button">Route PDF</button>
            </div>
          </div>
        </details>

        <details class="section" open>
          <summary id="sectionOpsSummary">Operations</summary>
          <div class="sectionBody">
            <div class="routeGrid3" style="margin-top:2px;">
              <select id="routeOpSel"></select>
              <button id="opAddBtn" class="primary" type="button">+ Operation</button>
              <button id="opDeleteBtn" class="danger" type="button">Delete Operation</button>
            </div>
            <div class="routeTools">
              <button id="opUpBtn" type="button">Move Up</button>
              <button id="opDownBtn" type="button">Move Down</button>
            </div>
            <div class="routeGrid3" style="margin-top:8px;">
              <input id="opSeqIn" type="number" step="1" placeholder="Seq" />
              <input id="opNameIn" type="text" placeholder="Operation name" />
              <input id="opStationIn" type="text" placeholder="Station code" />
              <input id="opWorkstationIn" type="text" placeholder="Workstation" />
              <input id="opEstTimeIn" type="number" step="0.1" placeholder="Estimated time (min)" />
              <input id="opSampleSizeIn" type="number" step="1" placeholder="Sample size" />
              <input id="opFrequencyIn" type="text" placeholder="Frequency (e.g. 1/30min)" />
              <input id="opControlMethodIn" type="text" placeholder="Control method" />
              <input id="opNotesIn" type="text" placeholder="Operation notes" />
            </div>
            <div class="routeTools">
              <label style="display:flex;align-items:center;gap:6px;padding:8px 10px;border:1px solid var(--border);border-radius:10px;">
                <input id="opCriticalChk" type="checkbox" style="width:auto;padding:0;" />
                <span id="opCriticalLbl">Critical operation</span>
              </label>
              <button id="opSaveBtn" class="primary" type="button">Save Operation</button>
            </div>
          </div>
        </details>

        <details class="section">
          <summary id="sectionBubblesSummary">Annotations</summary>
          <div class="sectionBody">
            <div class="mini" id="bubbleSectionHint" style="margin-top:2px;">Dimensional annotations for selected operation</div>
            <div class="routeGrid3" style="margin-top:8px;">
              <input id="bubbleIdIn" type="text" placeholder="Annotation ID (e.g. A01)" />
              <input id="bubbleNameIn" type="text" placeholder="Annotation name" />
              <input id="bubbleNomIn" type="number" step="0.001" placeholder="Nominal" />
              <input id="bubbleLslIn" type="number" step="0.001" placeholder="Lower limit" />
              <input id="bubbleUslIn" type="number" step="0.001" placeholder="Upper limit" />
              <input id="bubbleUnitIn" type="text" placeholder="Unit (mm)" />
              <input id="bubbleMethodIn" type="text" placeholder="Method" />
              <input id="bubbleInstrumentIn" type="text" placeholder="Instrument" />
              <input id="bubbleReactionIn" type="text" placeholder="Reaction plan" />
            </div>
            <div class="routeTools">
              <button id="bubbleSaveBtn" class="primary" type="button">Save Annotation</button>
              <button id="bubbleClearBtn" type="button">Clear Annotation Form</button>
              <button id="bubbleImportBtn" type="button">Import Annotations CSV</button>
              <input id="bubbleImportFile" type="file" accept=".csv,text/csv" style="display:none;" />
            </div>
            <div class="tableWrap">
              <table class="tbl">
                <thead>
                  <tr>
                    <th id="bubbleHeadId">Annotation</th>
                    <th id="bubbleHeadName">Name</th>
                    <th id="bubbleHeadSpec">Spec</th>
                    <th id="bubbleHeadActions">Actions</th>
                  </tr>
                </thead>
                <tbody id="bubbleTableBody"></tbody>
              </table>
            </div>
          </div>
        </details>

        <details class="section">
          <summary id="sectionBlueprintSummary">Blueprint</summary>
          <div class="sectionBody">
            <div class="chartTitle" id="bubbleCanvasTitle" style="margin-top:2px;">Annotation Canvas</div>
            <div class="routeTools">
              <select id="opFileSel"></select>
              <button id="opFileUploadBtn" class="primary" type="button">+ File(s)</button>
              <button id="opFileRenameBtn" type="button">Rename File</button>
              <button id="opFileDeleteBtn" class="danger" type="button">Delete File</button>
              <input id="opFileInput" type="file" multiple style="display:none;" />
              <button id="opExportFileJpgBtn" type="button">Export Annotated JPG</button>
              <button id="opExportPdfBtn" class="warn" type="button">Operation PDF</button>
            </div>
            <div class="routeTools">
              <button id="bubbleDrawingClearBtn" type="button">Clear Image</button>
              <button id="bubbleOcrDetectBtn" type="button" class="warn">Auto OCR Annotations</button>
              <button id="bubbleOcrClickBtn" type="button">Click OCR</button>
              <select id="bubbleOcrModeSel">
                <option value="auto">auto</option>
                <option value="fast">fast</option>
                <option value="accurate">accurate</option>
                <option value="hardcore">hardcore</option>
              </select>
              <button id="bubbleOcrTestBtn" type="button">Test OCR</button>
              <details id="bubbleOcrSettings" style="flex:1 1 260px;">
                <summary id="bubbleOcrSettingsSummary">OCR Settings</summary>
                <div style="padding-top:8px;">
                  <input id="bubbleOcrUrlIn" type="text" placeholder="OCR URL (http://localhost:8081)" style="width:100%;" />
                </div>
              </details>
              <button id="bubbleDeleteSelBtn" type="button" class="danger">Delete Selected Annotation</button>
              <label style="display:flex;align-items:center;gap:6px;padding:8px 10px;border:1px solid var(--border);border-radius:10px;">
                <input id="bubbleShowBoxesChk" class="inlineCheck" type="checkbox" checked />
                <span id="bubbleShowBoxesLbl">Show boxes</span>
              </label>
            </div>
            <div class="routeTools">
              <button id="bubbleZoomOutBtn" type="button">-</button>
              <button id="bubbleZoomResetBtn" type="button">100%</button>
              <button id="bubbleZoomFitBtn" type="button">Fit</button>
              <button id="bubbleZoomInBtn" type="button">+</button>
              <button id="bubbleFullscreenBtn" type="button">Fullscreen</button>
            </div>
            <div class="mini" id="bubbleOcrStatus"></div>
            <div class="mini" id="bubbleCanvasInfo">Drag to draw, move, zoom, and double-click OCR.</div>
            <div class="canvasWrap" id="bubbleCanvasWrap">
              <canvas id="bubbleCanvas" width="1000" height="560"></canvas>
            </div>
          </div>
        </details>
      </div>
    </section>
  </div>

  <script src="./modules/module-shell.js"></script>
  <script src="./modules/module-io.js"></script>
  <script src="./modules/module-lang.js"></script>
  <script src="./modules/module-data.js"></script>
  <script src="./modules/module-theme.js"></script>
  <script>
    (function () {
      function applyGlobalTheme(event) {
        if (!window.VMillTheme?.applyTheme) return;
        window.VMillTheme.applyTheme(document, "spacial", event?.detail?.theme || null);
      }
      applyGlobalTheme();
      window.addEventListener("vmill:theme:changed", applyGlobalTheme);

      const KEY = window.VMillData?.keys?.APP_KEY || "vmill:app-state:v1";
      const LEGACY_KEYS = Array.isArray(window.VMillData?.keys?.LEGACY_APP_KEYS)
        ? window.VMillData.keys.LEGACY_APP_KEYS.slice()
        : ["chrono_drawer_timeline_v5", "chrono_drawer_timeline_v4", "chrono_drawer_timeline_v3"];
      const MODULE_KEY = String(window.VMillData?.keys?.MODULE_KEY || "vmill:module-data:v1");
      const HUB_SCOPE_KEY = "vmill:hub-scope:v1";
      const IN_HUB_WORKSPACE = (() => {
        try {
          return window.self !== window.top && /vmill_hub\.html/i.test(String(window.top?.location?.pathname || ""));
        } catch {
          return window.self !== window.top;
        }
      })();
      const OCR_URL_KEY = "vmill:ocr:url";
      const WATCH_KEYS = Array.from(new Set([
        ...(Array.isArray(window.VMillData?.keys?.ALL_APP_KEYS)
          ? window.VMillData.keys.ALL_APP_KEYS.slice()
          : [KEY, ...LEGACY_KEYS]),
        MODULE_KEY,
      ]));
      const NS_ROUTE = "spacial_routes";
      const launchParams = new URLSearchParams(window.location.search || "");
      let launchRouteApplied = false;
      let lastStateSig = "";
      let routePlan = null;
      let selectedScopeTypeId = "";
      let selectedScopeItemId = "";
      let selectedProductFilterId = "";
      let selectedStationFilterId = "";
      let selectedJobFilterId = "";
      let selectedRouteId = "";
      let selectedOpId = "";
      let selectedOpFileId = "";
      let editingBubbleId = "";
      let selectedCanvasBubbleId = "";
      let bubbleCanvasImage = null;
      let scopeJobsCacheSig = "";
      let scopeJobsCacheSet = null;
      let bubbleCanvasImageSrc = "";
      let bubbleCanvasMode = "idle"; // idle | draw | dragBox | dragLabel
      let bubbleCanvasStart = null;
      let bubbleCanvasRect = null;
      let bubbleCanvasLast = null;
      let bubbleOcrBusy = false;
      let bubbleClickOcrArmed = false;
      let bubbleCanvasZoom = 1;
      let bubbleCanvasPan = null;
      let refreshRaf = 0;
      function requestRefresh() {
        if (refreshRaf) return;
        refreshRaf = window.requestAnimationFrame(() => {
          refreshRaf = 0;
          refresh();
        });
      }
      const $ = (id) => document.getElementById(id);
      if (IN_HUB_WORKSPACE) {
        document.body.classList.add("hubScopeOnly");
      }
      function tt(key, fallback = "", vars) {
        return window.VMillLang?.t ? window.VMillLang.t(key, fallback, vars) : fallback;
      }
      function applySpacialI18n() {
        const setTxt = (id, key, fallback) => {
          const el = $(id);
          if (el) el.textContent = tt(key, fallback);
        };
        const setPh = (id, key, fallback) => {
          const el = $(id);
          if (el) el.placeholder = tt(key, fallback);
        };
        setTxt("spacialTitle", "spacial.title", "SPaCial");
        setTxt("spacialSubtitle", "spacial.subtitle.annotations", "Dimensional control and blueprint annotation planning.");
        setTxt("routeNewBtn", "spacial.route.new", "+ Route");
        setTxt("routeDupBtn", "spacial.route.duplicate", "Duplicate Route");
        setTxt("routeDeleteBtn", "spacial.route.delete", "Delete Route");
        setTxt("routingTitle", "spacial.routing.title", "Routing and Dimensional Control");
        setTxt("sectionRouteSummary", "spacial.section.route", "Route");
        setTxt("sectionOpsSummary", "spacial.section.operations", "Operations");
        setTxt("sectionBubblesSummary", "spacial.section.annotations", "Annotations");
        setTxt("sectionBlueprintSummary", "spacial.section.blueprint", "Blueprint");
        setTxt("routeSaveBtn", "spacial.saveRoute", "Save Route");
        setTxt("routeResetBtn", "spacial.reload", "Reload");
        setTxt("routeExportJsonBtn", "spacial.routeJson", "Route JSON");
        setTxt("routeExportCsvBtn", "spacial.routeCsv", "Route CSV");
        setTxt("routeExportPdfBtn", "spacial.routePdf", "Route PDF");
        setTxt("opAddBtn", "spacial.addOperation", "+ Operation");
        setTxt("opDeleteBtn", "spacial.deleteOperation", "Delete Operation");
        setTxt("opUpBtn", "spacial.moveUp", "Move Up");
        setTxt("opDownBtn", "spacial.moveDown", "Move Down");
        setTxt("opCriticalLbl", "spacial.op.critical", "Critical operation");
        setTxt("opSaveBtn", "spacial.op.save", "Save Operation");
        setTxt("bubbleSectionHint", "spacial.annotations.title", "Dimensional annotations for selected operation");
        setTxt("bubbleSaveBtn", "spacial.annotation.save", "Save Annotation");
        setTxt("bubbleClearBtn", "spacial.annotation.clear", "Clear Annotation Form");
        setTxt("bubbleImportBtn", "spacial.annotation.importCsv", "Import Annotations CSV");
        setTxt("bubbleHeadId", "spacial.table.annotation", "Annotation");
        setTxt("bubbleHeadName", "spacial.table.name", "Name");
        setTxt("bubbleHeadSpec", "spacial.table.spec", "Spec");
        setTxt("bubbleHeadActions", "spacial.table.actions", "Actions");
        setTxt("bubbleCanvasTitle", "spacial.canvas.title.annotation", "Annotation Canvas");
        setTxt("opFileUploadBtn", "spacial.file.add", "+ File(s)");
        setTxt("opFileRenameBtn", "spacial.file.rename", "Rename File");
        setTxt("opFileDeleteBtn", "spacial.file.delete", "Delete File");
        setTxt("opExportFileJpgBtn", "spacial.file.exportJpg", "Export Annotated JPG");
        setTxt("opExportPdfBtn", "spacial.file.exportOpPdf", "Operation PDF");
        setTxt("bubbleDrawingClearBtn", "spacial.canvas.clearImage", "Clear Image");
        setTxt("bubbleOcrDetectBtn", "spacial.ocr.detect.annotations", "Auto OCR Annotations");
        setTxt("bubbleOcrClickBtn", "spacial.ocr.clickDetect", "Click OCR");
        setTxt("bubbleOcrTestBtn", "spacial.ocr.test", "Test OCR");
        setTxt("bubbleOcrSettingsSummary", "spacial.ocr.settings", "OCR Settings");
        setTxt("bubbleDeleteSelBtn", "spacial.canvas.deleteSelectedAnnotation", "Delete Selected Annotation");
        setTxt("bubbleShowBoxesLbl", "spacial.canvas.showBoxes", "Show boxes");
        setTxt("bubbleZoomOutBtn", "spacial.canvas.zoomOut", "-");
        setTxt("bubbleZoomResetBtn", "spacial.canvas.zoomReset", "100%");
        setTxt("bubbleZoomFitBtn", "spacial.canvas.zoomFit", "Fit");
        setTxt("bubbleZoomInBtn", "spacial.canvas.zoomIn", "+");
        setTxt("bubbleFullscreenBtn", "spacial.canvas.fullscreen", "Fullscreen");
        setTxt("bubbleCanvasInfo", "spacial.canvas.help.annotations", "Drag to draw, move, zoom, and double-click OCR.");
        const modeSel = $("bubbleOcrModeSel");
        if (modeSel) {
          const prev = strOrEmpty(modeSel.value || "auto") || "auto";
          modeSel.innerHTML = [
            `<option value="auto">${tt("spacial.ocr.mode.auto", "Auto")}</option>`,

      function splitCsvLine(line, sep) {
        const out = [];
        let cur = "";
        let inQuote = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          const next = line[i + 1];
          if (ch === "\"") {
            if (inQuote && next === "\"") { cur += "\""; i++; continue; }
            inQuote = !inQuote;
            continue;
          }
          if (ch === sep && !inQuote) {
            out.push(cur);
            cur = "";
            continue;
          }
          cur += ch;
        }
        out.push(cur);
        return out.map((x) => x.trim());
      }
      function parseCsvRows(text) {
        const lines = String(text || "").replace(/\r/g, "\n").split("\n").map((x) => x.trim()).filter(Boolean);
        if (!lines.length) return [];
        const seps = [",", ";", "\t"];
        let bestSep = ",";
        let bestScore = -1;
        for (const sep of seps) {
          const score = splitCsvLine(lines[0], sep).length;
          if (score > bestScore) { bestScore = score; bestSep = sep; }
        }
        const header = splitCsvLine(lines[0], bestSep).map((h) => String(h || "").toLowerCase().replace(/[^a-z0-9]+/g, ""));
        const rows = [];
        for (let i = 1; i < lines.length; i++) {
          const cells = splitCsvLine(lines[i], bestSep);
          if (!cells.some((x) => String(x || "").trim())) continue;
          const obj = {};
          for (let c = 0; c < header.length; c++) obj[header[c]] = cells[c] ?? "";
          rows.push(obj);
        }
        return rows;
      }
      function fromAlias(row, aliases) {
        for (const key of aliases) {
          const k = String(key || "").toLowerCase().replace(/[^a-z0-9]+/g, "");
          const val = row[k];
          if (val != null && String(val).trim() !== "") return String(val).trim();
        }
        return "";
      }
      function numFromAlias(row, aliases) {
        const raw = fromAlias(row, aliases);
        if (!raw) return null;
        const n = Number(String(raw).replace(",", "."));
        return Number.isFinite(n) ? n : null;
      }
      function importBubblesCsv(file) {
        if (!file) return;
        const op = operationById(selectedOpId);
        if (!op) {
          alert(tt("spacial.none.operation", "Select or create an operation first."));
          return;
        }
        const bubbles = selectedFileBubbles(op);
        const fr = new FileReader();
        fr.onload = () => {
          try {
            const rows = parseCsvRows(String(fr.result || ""));
            if (!rows.length) throw new Error(tt("spacial.import.noRows", "No rows found."));
            const imported = [];
            for (const row of rows) {
              const id = fromAlias(row, ["bubble", "bubbleid", "id", "num", "number", "char"]);
              const name = fromAlias(row, ["name", "dimension", "feature", "characteristic"]);
              const nominal = fromAlias(row, ["nominal", "target", "nom"]);
              const lsl = fromAlias(row, ["lsl", "min", "lower", "specmin"]);
              const usl = fromAlias(row, ["usl", "max", "upper", "specmax"]);
              const unit = fromAlias(row, ["unit", "uom"]);
              const method = fromAlias(row, ["method", "controlmethod", "inspectionmethod"]);
              const instrument = fromAlias(row, ["instrument", "gauge", "gage", "tool"]);
              const reaction = fromAlias(row, ["reaction", "reactionplan", "plan", "action"]);
              const x1 = numFromAlias(row, ["x1", "left", "xmin", "bboxx1"]);
              const y1 = numFromAlias(row, ["y1", "top", "ymin", "bboxy1"]);
              const x2Raw = numFromAlias(row, ["x2", "right", "xmax", "bboxx2"]);
              const y2Raw = numFromAlias(row, ["y2", "bottom", "ymax", "bboxy2"]);
              const width = numFromAlias(row, ["width", "w", "bboxwidth"]);
              const height = numFromAlias(row, ["height", "h", "bboxheight"]);
              const x2 = x2Raw != null ? x2Raw : (x1 != null && width != null ? x1 + width : null);
              const y2 = y2Raw != null ? y2Raw : (y1 != null && height != null ? y1 + height : null);
              const labelX = numFromAlias(row, ["bubbleoffsetx", "offsetx", "labelx", "bubblex"]);
              const labelY = numFromAlias(row, ["bubbleoffsety", "offsety", "labely", "bubbley"]);
              if (!id && !name) continue;
              imported.push(normalizeBubble({
                id: id || "",
                name: name || "",
                nominal,
                lsl,
                usl,
                unit,
                method,
                instrument,
                reactionPlan: reaction,
                bbox: (x1 != null && y1 != null && x2 != null && y2 != null) ? { x1, y1, x2, y2 } : null,
                bubbleOffset: (labelX != null && labelY != null) ? { x: labelX, y: labelY } : null,
              }, bubbles.length + imported.length));
            }
            if (!imported.length) throw new Error(tt("spacial.import.noValid.annotations", "No valid annotations found."));
            for (const b of imported) {
              const idx = bubbles.findIndex((x) => String(x.id || "") === String(b.id || ""));
              if (idx >= 0) bubbles[idx] = b;
              else bubbles.push(b);
            }
            writeRoutePlan(routePlan);
            renderRoutingPanel();
            alert(tt("spacial.import.done.annotations", "Imported {count} annotation(s).", { count: imported.length }));
          } catch (err) {
            alert(tt("spacial.import.failed", "CSV import failed: {err}", { err: err?.message || "invalid file" }));
          }
        };
        fr.readAsText(file);
      }

      function safeFilename(name, fallback = "file") {
        const base = String(name || "").trim().replace(/[\\/:*?"<>|]+/g, "_").replace(/\s+/g, " ");
        return base || fallback;
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const fr = new FileReader();
          fr.onload = () => resolve(String(fr.result || ""));
          fr.onerror = () => reject(new Error("read-failed"));
          fr.readAsDataURL(file);
        });
      }

      async function addFilesToSelectedOperation(fileList) {
        const op = getSelectedOperation();
        if (!op) {
          alert(tt("spacial.none.operation", "Select or create an operation first."));
          return;
        }
        const filesToAdd = Array.from(fileList || []).filter(Boolean);
        if (!filesToAdd.length) return;
        const opFiles = ensureOperationFiles(op);
        let lastId = "";
        const hasPdf = filesToAdd.some((f) => /\.pdf$/i.test(String(f?.name || "")) || /application\/pdf/i.test(String(f?.type || "")));
        if (hasPdf) applyOcrBusyState(true);
        for (let index = 0; index < filesToAdd.length; index++) {
          const file = filesToAdd[index];
          try {
            const isPdf = /\.pdf$/i.test(String(file?.name || "")) || /application\/pdf/i.test(String(file?.type || ""));
            let dataUrl = await readFileAsDataUrl(file);
            let mime = file.type || "";
            let sourceDataUrl = "";
            let sourceMime = "";
            let sourceName = "";
            let sourcePage = 0;
            if (isPdf) {
              sourceDataUrl = dataUrl;
              sourceMime = file.type || "application/pdf";
              sourceName = String(file.name || "file.pdf");
              setOcrStatus("info", tt("spacial.ocr.pdf.converting", "Converting PDF page to image..."));
              try {
                const out = await callOcrPdfToImageWithRetry(file, ensureOcrUrlInput(), 0, 220);
                const converted = strOrEmpty(out?.image?.data_url || out?.data_url || "");
                if (!isImageDataUrl(converted)) throw new Error("converted-image-missing");
                dataUrl = converted;
                mime = strOrEmpty(out?.image?.mime || "image/png");
                sourcePage = Number(out?.image?.page || 0) || 0;
                setOcrStatus("ok", tt("spacial.ocr.pdf.converted", "PDF converted. You can annotate this page now."));
              } catch (err) {
                setOcrStatus("danger", tt("spacial.ocr.pdf.convertFailed", "PDF convert failed: {err}", { err: err?.message || String(err || "unknown") }));
                continue;
              }
            }
            const first = opFiles[0];
            const canReuseFirst =
              index === 0 &&
              opFiles.length === 1 &&
              first &&
              !strOrEmpty(first.dataUrl) &&
              Array.isArray(first.bubbles) &&
              first.bubbles.length === 0;
            if (canReuseFirst) {
              first.name = file.name || `${tt("spacial.file.default", "File")} 1`;
              first.mime = mime;
              first.dataUrl = dataUrl;
              first.sourceDataUrl = sourceDataUrl;
              first.sourceMime = sourceMime;
              first.sourceName = sourceName;
              first.sourcePage = sourcePage;
              lastId = first.id;
              continue;
            }
            const next = normalizeOperationFile({
              name: file.name || `${tt("spacial.file.default", "File")} ${opFiles.length + 1}`,
              mime,
              dataUrl,
              sourceDataUrl,
              sourceMime,
              sourceName,
              sourcePage,
              bubbles: [],
            }, opFiles.length);
            opFiles.push(next);
            lastId = next.id;
          } catch {}
        }
        if (hasPdf) applyOcrBusyState(false);
        if (!lastId) return;
        selectedOpFileId = lastId;
        op.activeFileId = lastId;
        selectedCanvasBubbleId = "";
        clearBubbleForm();
        writeRoutePlan(routePlan);
        renderRoutingPanel();
      }

      function drawOperationBubblesToCanvas(ctx, bubbles, theme) {
        const accent = theme?.accent || "#4dafff";
        const ok = theme?.ok || accent;
        const text = theme?.text || "#ffffff";
        const bg = theme?.bg || "#0f1724";
        for (let i = 0; i < bubbles.length; i++) {
          const b = bubbles[i];
          const box = normalizeBbox(b?.bbox);
          if (!box) continue;
          const isSel = String(b.id || "") === String(selectedCanvasBubbleId || "");
          ctx.strokeStyle = isSel ? ok : accent;
          ctx.lineWidth = isSel ? 3 : 2;
          ctx.fillStyle = isSel ? hexToRgba(ok, .10) : hexToRgba(accent, .08);
          ctx.strokeRect(box.x1, box.y1, box.x2 - box.x1, box.y2 - box.y1);
          ctx.fillRect(box.x1, box.y1, box.x2 - box.x1, box.y2 - box.y1);
          const label = bubbleLabelPosition(b);
          if (!label) continue;
          ctx.fillStyle = isSel ? hexToRgba(ok, .92) : hexToRgba(accent, .88);
          ctx.beginPath();
          ctx.arc(label.x, label.y, label.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = hexToRgba(text, .95);
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.fillStyle = bg;
          ctx.font = "bold 12px sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(String(i + 1), label.x, label.y);
        }
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
      }

      function exportSelectedOperationAnnotatedJpg() {
        const op = getSelectedOperation();
        const file = selectedOperationFile(op);
        if (!op || !file) return;
        if (!isImageDataUrl(file.dataUrl)) {
          alert(tt("spacial.alert.imageFileRequired", "Current file is not an image. Upload/select an image file first."));
          return;
        }
        const img = new Image();
        img.onload = () => {
          const cv = document.createElement("canvas");
          cv.width = img.width;
          cv.height = img.height;
          const ctx = cv.getContext("2d");
          if (!ctx) return;
          ctx.drawImage(img, 0, 0, cv.width, cv.height);
          drawOperationBubblesToCanvas(ctx, Array.isArray(file.bubbles) ? file.bubbles : [], {
            accent: cssThemeHex("--accent", "#4dafff"),
            ok: cssThemeHex("--ok", "#00ff8f"),
            text: cssThemeHex("--text", "#ffffff"),
            bg: cssThemeHex("--bg", "#0f1724"),
          });
          const name = safeFilename(`${routePlan?.jobName || "job"}_${op.seq || "op"}_${file.name || "file"}_annotated`, "operation_annotated");
          if (cv.toBlob) {
            cv.toBlob((blob) => {
              if (!blob) return;
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url;
              a.download = `${name}.jpg`;
              document.body.appendChild(a);
              a.click();
              a.remove();
              URL.revokeObjectURL(url);
            }, "image/jpeg", 0.92);
          } else {
            const a = document.createElement("a");
            a.href = cv.toDataURL("image/jpeg", 0.92);
            a.download = `${name}.jpg`;
            document.body.appendChild(a);
            a.click();
            a.remove();
          }
        };
        img.onerror = () => alert(tt("spacial.alert.imageLoadFailed", "Failed to load image for export."));
        img.src = file.dataUrl;
      }

        if (!msg || !msg.type) return;
        if (msg.type === "data:sync:status") return;
        if (msg.type.startsWith("data:") || msg.type === "vmill:hub-scope:changed") {
          requestRefresh();
        }
      });
      window.addEventListener("vmill:hub-scope:changed", requestRefresh);
      window.addEventListener("storage", (e) => {
        if (!e.key) return;
        if (e.key === HUB_SCOPE_KEY) {
          requestRefresh();
          return;
        }
        if (WATCH_KEYS.includes(e.key)) {
          requestRefresh();
          return;
        }
      });
      window.addEventListener("vmill:lang:changed", () => {
        applySpacialI18n();
        applyOcrBusyState(bubbleOcrBusy);
        requestRefresh();
      });
      setInterval(() => {
        const env = readStateEnvelope();
        const moduleMetaUpdated = String(window.VMillData?.readModuleState?.()?.meta?.updatedAt || "");
        const sig = JSON.stringify({
          s: env.source,
          c: env.state?.meta?.updatedAt || "",
          a: env.state?.activeJobId || "",
          j: (env.state?.jobs || []).length,
          t: (env.state?.stations || []).length,
          m: moduleMetaUpdated,
        });
        if (sig !== lastStateSig) {
          lastStateSig = sig;
          requestRefresh();
        }
      }, 5000);
      applySpacialI18n();
      ensureOcrUrlInput();
      setOcrStatus("muted", tt("spacial.ocr.ready", "OCR ready."));
      window.CANBus?.emit("spacial:ready", { module: "SPaCial" }, "spacial");

      requestRefresh();
    })();
  </script>
</body>
</html>
