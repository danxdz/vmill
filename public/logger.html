<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VMill Logger</title>
  <style>
    :root {
      --bg: var(--vm-theme-bg, #0b111b);
      --panel: var(--vm-theme-panel, #121b2b);
      --panel2: var(--vm-theme-panel-2, #0f1726);
      --text: var(--vm-theme-text, #e8eef8);
      --muted: var(--vm-theme-muted, rgba(232,238,248,.66));
      --border: var(--vm-theme-border, rgba(232,238,248,.2));
      --acc: var(--vm-theme-accent, #57b4ff);
      --ok: var(--vm-theme-ok, #68d39a);
      --warn: var(--vm-theme-warn, #ffd37a);
      --danger: var(--vm-theme-danger, #ff7d93);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100dvh;
      background: linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg) 84%, #000));
      color: var(--text);
      font-family: "Space Grotesk", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow: hidden;
    }
    .dock {
      position: relative;
      z-index: 1;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      box-shadow: 0 18px 32px rgba(0,0,0,.32);
      width: min(1680px, calc(100vw - 16px));
      height: calc(100dvh - 86px);
      margin: 74px auto 10px;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      overflow: hidden;
    }
    body.embedMode .dock{
      width:100vw;
      height:100dvh;
      margin:0;
      border-radius:0;
      border:0;
      box-shadow:none;
    }
    body.embedMode #openHubBtn,
    body.embedMode #exportCsvBtn,
    body.embedMode #exportTxtBtn,
    body.embedMode #settingsRow,
    body.embedMode .controls .field:nth-child(2),
    body.embedMode .controls .field:nth-child(3){
      display:none !important;
    }
    body.embedMode .controls{
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .head {
      padding: 8px;
      border-bottom: 1px solid color-mix(in srgb, var(--text) 10%, transparent);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .title { font-weight: 800; letter-spacing: .03em; }
    .spacer { flex: 1 1 auto; }
    .pill {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 10px;
      color: var(--muted);
      background: rgba(255,255,255,.03);
      white-space: nowrap;
    }
    .pill.info { border-color: color-mix(in srgb, var(--acc) 52%, var(--border)); color: var(--text); }
    .pill.warn { border-color: color-mix(in srgb, var(--warn) 52%, var(--border)); color: color-mix(in srgb, var(--warn) 75%, var(--text)); }
    .pill.error { border-color: color-mix(in srgb, var(--danger) 58%, var(--border)); color: color-mix(in srgb, var(--danger) 78%, var(--text)); }
    .btn {
      border: 1px solid var(--border);
      border-radius: 9px;
      background: rgba(255,255,255,.03);
      color: var(--text);
      padding: 6px 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn.primary {
      border-color: color-mix(in srgb, var(--acc) 58%, var(--border));
      background: color-mix(in srgb, var(--acc) 12%, transparent);
    }
    .btn.warn {
      border-color: color-mix(in srgb, var(--danger) 52%, var(--border));
      background: color-mix(in srgb, var(--danger) 12%, transparent);
    }
    .statusStrip {
      border-bottom: 1px solid color-mix(in srgb, var(--text) 9%, transparent);
      padding: 7px 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      background: color-mix(in srgb, var(--panel2) 92%, transparent);
      min-height: 34px;
    }
    .statusLine {
      flex: 1 1 260px;
      min-width: 0;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      border-bottom: 1px solid color-mix(in srgb, var(--text) 9%, transparent);
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 8px;
      background: color-mix(in srgb, var(--panel2) 88%, transparent);
    }
    .field { display: grid; gap: 5px; }
    .field label { font-size: 10px; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; }
    .field input,
    .field select {
      border: 1px solid var(--border);
      border-radius: 9px;
      background: color-mix(in srgb, var(--panel2) 84%, #000);
      color: var(--text);
      padding: 6px 7px;
      font: inherit;
      font-size: 12px;
      width: 100%;
    }
    .levelRow { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .toggle {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 7px;
      background: rgba(255,255,255,.03);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .settings {
      border-bottom: 1px solid color-mix(in srgb, var(--text) 8%, transparent);
      padding: 7px 8px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      background: color-mix(in srgb, var(--panel2) 90%, transparent);
    }
    .mini {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 4px 6px;
      background: rgba(255,255,255,.03);
      color: var(--muted);
      font-size: 11px;
    }
    .mini input[type="range"] { width: 90px; accent-color: var(--acc); }

    .logWrap {
      overflow: auto;
      padding: 0;
      background: color-mix(in srgb, var(--panel2) 94%, #000 6%);
    }
    .table {
      min-width: 860px;
      width: 100%;
      border-collapse: collapse;
    }
    .table th,
    .table td {
      border-bottom: 1px solid color-mix(in srgb, var(--text) 10%, transparent);
      padding: 6px 8px;
      vertical-align: top;
      text-align: left;
      font-size: 12px;
    }
    .table thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: color-mix(in srgb, var(--panel2) 96%, transparent);
      font-size: 10px;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .sev {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      display: inline-block;
      min-width: 56px;
      text-align: center;
    }
    .sev.info { border-color: color-mix(in srgb, var(--acc) 58%, var(--border)); color: color-mix(in srgb, var(--acc) 85%, var(--text)); }
    .sev.warn { border-color: color-mix(in srgb, var(--warn) 52%, var(--border)); color: color-mix(in srgb, var(--warn) 80%, var(--text)); }
    .sev.error { border-color: color-mix(in srgb, var(--danger) 58%, var(--border)); color: color-mix(in srgb, var(--danger) 84%, var(--text)); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; }
    .muted { color: var(--muted); }
    details.payload { margin-top: 4px; }
    details.payload > summary { cursor: pointer; color: var(--muted); font-size: 11px; }
    details.payload pre {
      margin: 6px 0 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px;
      background: rgba(0,0,0,.18);
      color: var(--text);
      max-height: 200px;
      overflow: auto;
      white-space: pre-wrap;
      font-size: 11px;
    }

    @media (max-width: 900px) {
      .dock {
        width: calc(100vw - 12px);
        height: calc(100dvh - 76px);
        margin: 70px auto 6px;
      }
      .table { min-width: 640px; }
      .controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <section class="dock" id="loggerDock">
    <header class="head">
      <div class="title" id="loggerTitle">Logger</div>
      <a class="btn" href="./vmill_hub.html" id="openHubBtn">Hub</a>
      <button class="btn" id="pauseBtn" type="button">Pause</button>
      <button class="btn primary" id="exportJsonBtn" type="button">Export JSON</button>
      <button class="btn" id="exportCsvBtn" type="button">Export CSV</button>
      <button class="btn" id="exportTxtBtn" type="button">Export TXT</button>
      <button class="btn warn" id="clearBtn" type="button">Clear</button>
      <div class="spacer"></div>
      <span class="pill info" id="countInfo">0 info</span>
      <span class="pill warn" id="countWarn">0 warn</span>
      <span class="pill error" id="countError">0 error</span>
    </header>

    <div class="statusStrip">
      <div class="statusLine" id="statusLine">No log entries yet.</div>
      <span class="pill" id="onlinePill">offline</span>
    </div>

    <section class="controls">
      <div class="field">
        <label id="searchLbl" for="searchIn">Search</label>
        <input id="searchIn" type="text" placeholder="type/source/payload..." />
      </div>
      <div class="field">
        <label id="sourceLbl" for="sourceSel">Source</label>
        <select id="sourceSel"><option value="all">All</option></select>
      </div>
      <div class="field">
        <label id="categoryLbl" for="categorySel">Category</label>
        <select id="categorySel"><option value="all">All</option></select>
      </div>
      <div class="field">
        <label id="levelsLbl">Levels</label>
        <div class="levelRow">
          <label class="toggle"><input id="lvlInfo" type="checkbox" checked /> info</label>
          <label class="toggle"><input id="lvlWarn" type="checkbox" checked /> warn</label>
          <label class="toggle"><input id="lvlError" type="checkbox" checked /> error</label>
          <label class="toggle"><input id="autoScrollChk" type="checkbox" checked /> autoscroll</label>
          <label class="toggle" title="Periodically fetch OCR server log lines (uses HTTP polling; turn off to save idle traffic)."><input id="pollOcrChk" type="checkbox" /> OCR poll</label>
          <button class="btn ghost" type="button" id="pullOcrLogsBtn" title="Fetch OCR server logs once (no background loop)">OCR ↓</button>
        </div>
      </div>
    </section>

    <section class="settings" id="settingsRow">
      <label class="toggle"><input id="activeChk" type="checkbox" checked /> show status bar</label>
      <label class="toggle"><input id="alertOnlyChk" type="checkbox" /> status: issues only</label>
      <span class="mini" id="positionMini">Position
        <select id="posSel">
          <option value="bottom-right">bottom-right</option>
          <option value="bottom-left">bottom-left</option>
          <option value="top-right">top-right</option>
          <option value="top-left">top-left</option>
        </select>
      </span>
      <span class="mini" id="rowsMini">Rows <input id="rowsRange" type="range" min="50" max="1200" step="10" /><span id="rowsVal">0</span></span>
    </section>

    <div class="logWrap" id="logWrap">
      <table class="table">
        <thead>
          <tr>
            <th id="thTime">Time</th>
            <th id="thLevel">Level</th>
            <th id="thType">Type</th>
            <th id="thSource">Source</th>
            <th id="thSummary">Summary</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </section>

  <script src="./modules/module-shell.js"></script>
  <script src="./modules/module-registry.js"></script>
  <script src="./modules/module-io.js"></script>
  <script src="./modules/module-auth.js"></script>
  <script src="./modules/module-lang.js"></script>
  <script src="./modules/module-data.js"></script>
  <script src="./modules/module-theme.js"></script>
  <script>
    (() => {
      const OFFLINE_MODE_KEY = "vmill:offline:mode";
      const UI_KEY = "vmill:logger:ui:v1";
      const LOG_KEY = "vmill:logger:entries:v1";
      const HUB_OCR_LOG_POLL_KEY = "vmill:hub:ocrLogPoll";
      const EMBED_MODE = (() => {
        try {
          const qp = new URLSearchParams(window.location.search || "");
          if (qp.get("embed") === "1") return true;
        } catch {}
        try {
          return window.self !== window.top;
        } catch {
          return true;
        }
      })();
      if (EMBED_MODE) document.body.classList.add("embedMode");

      if (!window.VMillAuth?.isLoggedIn?.()) {
        let offline = false;
        try { offline = String(localStorage.getItem(OFFLINE_MODE_KEY) || "") === "1"; } catch {}
        if (!offline) {
          location.replace("./login.html");
          return;
        }
      }

      const dock = document.getElementById("loggerDock");
      const body = document.getElementById("logBody");
      const statusLine = document.getElementById("statusLine");
      const countInfo = document.getElementById("countInfo");
      const countWarn = document.getElementById("countWarn");
      const countError = document.getElementById("countError");
      const onlinePill = document.getElementById("onlinePill");
      const searchIn = document.getElementById("searchIn");
      const searchLbl = document.getElementById("searchLbl");
      const sourceSel = document.getElementById("sourceSel");
      const sourceLbl = document.getElementById("sourceLbl");
      const categorySel = document.getElementById("categorySel");
      const categoryLbl = document.getElementById("categoryLbl");
      const levelsLbl = document.getElementById("levelsLbl");
      const lvlInfo = document.getElementById("lvlInfo");
      const lvlWarn = document.getElementById("lvlWarn");
      const lvlError = document.getElementById("lvlError");
      const autoScrollChk = document.getElementById("autoScrollChk");
      const pauseBtn = document.getElementById("pauseBtn");
      const exportJsonBtn = document.getElementById("exportJsonBtn");
      const exportCsvBtn = document.getElementById("exportCsvBtn");
      const exportTxtBtn = document.getElementById("exportTxtBtn");
      const clearBtn = document.getElementById("clearBtn");
      const activeChk = document.getElementById("activeChk");
      const posSel = document.getElementById("posSel");
      const alertOnlyChk = document.getElementById("alertOnlyChk");
      const pollOcrChk = document.getElementById("pollOcrChk");
      const pullOcrLogsBtn = document.getElementById("pullOcrLogsBtn");
      const rowsRange = document.getElementById("rowsRange");
      const rowsVal = document.getElementById("rowsVal");
      const logWrap = document.getElementById("logWrap");

      const state = {
        paused: false,
        ocrLogSeq: 0,
        ocrLogPollTimer: null,
        ocrLogPollError: "",
        ocrLogVisibilityBound: false,
        ui: {
          position: "bottom-right",
          maxRows: 350,
          autoScroll: true,
          active: true,
          alertOnly: false,
          panelOpen: false,
          pollOcrServer: false,
        },
      };

      function tt(key, fallback = "", vars) {
        return window.VMillLang?.t ? window.VMillLang.t(key, fallback, vars) : fallback;
      }

      function applyI18n() {
        const loggerTitle = document.getElementById("loggerTitle");
        const openHubBtn = document.getElementById("openHubBtn");
        const positionMini = document.getElementById("positionMini");
        const rowsMini = document.getElementById("rowsMini");
        if (loggerTitle) loggerTitle.textContent = tt("logger.title", "Logger");
        if (openHubBtn) openHubBtn.textContent = tt("common.hub", "Hub");
        if (pauseBtn) pauseBtn.textContent = state.paused ? tt("logger.resume", "Resume") : tt("logger.pause", "Pause");
        if (exportJsonBtn) exportJsonBtn.textContent = tt("logger.exportJson", "Export JSON");
        if (exportCsvBtn) exportCsvBtn.textContent = tt("logger.exportCsv", "Export CSV");
        if (exportTxtBtn) exportTxtBtn.textContent = tt("logger.exportTxt", "Export TXT");
        if (clearBtn) clearBtn.textContent = tt("hub.bus.clear", "Clear");
        if (searchLbl) searchLbl.textContent = tt("common.search", "Search");
        if (searchIn) searchIn.placeholder = tt("logger.searchPlaceholder", "type/source/payload...");
        if (sourceLbl) sourceLbl.textContent = tt("common.source", "Source");
        if (categoryLbl) categoryLbl.textContent = tt("common.category", "Category");
        if (levelsLbl) levelsLbl.textContent = tt("logger.levels", "Levels");
        if (positionMini) positionMini.firstChild.textContent = tt("logger.position", "Position");
        if (rowsMini) rowsMini.firstChild.textContent = tt("logger.rows", "Rows ");
        if (document.getElementById("thTime")) document.getElementById("thTime").textContent = tt("common.time", "Time");
        if (document.getElementById("thLevel")) document.getElementById("thLevel").textContent = tt("common.level", "Level");
        if (document.getElementById("thType")) document.getElementById("thType").textContent = tt("common.type", "Type");
        if (document.getElementById("thSource")) document.getElementById("thSource").textContent = tt("common.source", "Source");
        if (document.getElementById("thSummary")) document.getElementById("thSummary").textContent = tt("common.summary", "Summary");
      }

      function applyTheme(event) {
        if (!window.VMillTheme?.applyTheme) return;
        window.VMillTheme.applyTheme(document, "generic", event?.detail?.theme || null);
      }

      function safeParse(raw, fallback) {
        try {
          const parsed = JSON.parse(String(raw || ""));
          return parsed ?? fallback;
        } catch {
          return fallback;
        }
      }

      function resolveOcrBaseUrl() {
        const raw = String(localStorage.getItem("vmill:ocr:url") || "").trim();
        if (raw) return raw.replace(/\/+$/, "");
        const port = String(localStorage.getItem("vmill:ocr:port") || "8000").trim() || "8000";
        return `${window.location.protocol}//${window.location.hostname}:${port}`;
      }

      const OCR_LOG_POLL_MS = 8000;
      const OCR_LOG_POLL_HIDDEN_MS = 60000;

      /** URL ?ocrLogs=1 forces poll; ?ocrLogs=0 disables even if saved UI prefers on. */
      function ocrPollingWanted() {
        try {
          const qp = new URLSearchParams(window.location.search || "");
          if (qp.get("ocrLogs") === "1") return true;
          if (qp.get("ocrLogs") === "0") return false;
        } catch {}
        return !!state.ui.pollOcrServer;
      }

      function stopOcrLogPolling() {
        if (state.ocrLogPollTimer) clearInterval(state.ocrLogPollTimer);
        state.ocrLogPollTimer = null;
      }

      async function pollOcrServerLogs() {
        if (typeof document !== "undefined" && document.hidden) return;
        const base = resolveOcrBaseUrl();
        if (!base || !window.CANBus?.emit) return;
        try {
          const url = `${base}/ocr/logs/recent?after=${encodeURIComponent(String(state.ocrLogSeq || 0))}&limit=80`;
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const out = await res.json();
          const items = Array.isArray(out?.items) ? out.items : [];
          for (const item of items) {
            const seq = Number(item?.seq || 0);
            if (seq > state.ocrLogSeq) state.ocrLogSeq = seq;
            window.CANBus.emit("ocr:server:log", {
              seq,
              ts: Number(item?.ts || Date.now()),
              level: String(item?.level || "INFO"),
              logger: String(item?.logger || "ocr"),
              message: String(item?.message || ""),
              baseUrl: base,
            }, "ocr-server");
          }
          if (typeof out?.latest_seq === "number" && Number(out.latest_seq) > state.ocrLogSeq) {
            state.ocrLogSeq = Number(out.latest_seq);
          }
          state.ocrLogPollError = "";
        } catch (err) {
          const msg = String(err?.message || err || "");
          if (msg && msg !== state.ocrLogPollError) {
            state.ocrLogPollError = msg;
            window.CANBus.emit("ocr:server:status", {
              online: false,
              error: msg,
              serverUrl: base,
            }, "ocr-server");
          }
        }
      }

      function ocrLogPollIntervalMs() {
        return typeof document !== "undefined" && document.hidden ? OCR_LOG_POLL_HIDDEN_MS : OCR_LOG_POLL_MS;
      }

      function hubDefaultOcrPollFromStorage() {
        try {
          const v = String(localStorage.getItem(HUB_OCR_LOG_POLL_KEY) || "").trim();
          if (v === "1") return true;
          if (v === "0") return false;
        } catch {}
        return null;
      }

      function onOcrLogVisibilityChange() {
        if (!ocrPollingWanted()) {
          stopOcrLogPolling();
          return;
        }
        if (state.ocrLogPollTimer) clearInterval(state.ocrLogPollTimer);
        state.ocrLogPollTimer = setInterval(() => {
          void pollOcrServerLogs();
        }, ocrLogPollIntervalMs());
        if (typeof document !== "undefined" && !document.hidden) void pollOcrServerLogs();
      }

      function startOcrLogPollingIfEnabled() {
        stopOcrLogPolling();
        if (typeof document !== "undefined" && !state.ocrLogVisibilityBound) {
          state.ocrLogVisibilityBound = true;
          document.addEventListener("visibilitychange", onOcrLogVisibilityChange);
        }
        if (!ocrPollingWanted()) return;
        void pollOcrServerLogs();
        state.ocrLogPollTimer = setInterval(() => {
          void pollOcrServerLogs();
        }, ocrLogPollIntervalMs());
      }

      function readUi() {
        const src = safeParse(localStorage.getItem(UI_KEY), {});
        const rawPoll = src.pollOcrServer;
        let pollOcrServer;
        if (rawPoll === true) pollOcrServer = true;
        else if (rawPoll === false) pollOcrServer = false;
        else {
          const hubPref = hubDefaultOcrPollFromStorage();
          pollOcrServer = hubPref !== null ? hubPref : !EMBED_MODE;
        }
        return {
          position: ["top-left", "top-right", "bottom-left", "bottom-right"].includes(String(src.position || "")) ? String(src.position) : "bottom-right",
          maxRows: Math.max(50, Math.min(1200, Number(src.maxRows || 350))),
          autoScroll: src.autoScroll !== false,
          active: src.active !== false,
          alertOnly: src.alertOnly === true,
          panelOpen: src.panelOpen === true,
          pollOcrServer,
        };
      }

      function writeUi() {
        try { localStorage.setItem(UI_KEY, JSON.stringify(state.ui)); } catch {}
      }

      function applyUi() {
        if (activeChk) activeChk.checked = !!state.ui.active;
        posSel.value = state.ui.position;
        rowsRange.value = String(state.ui.maxRows);
        rowsVal.textContent = String(state.ui.maxRows);
        autoScrollChk.checked = !!state.ui.autoScroll;
        if (alertOnlyChk) alertOnlyChk.checked = !!state.ui.alertOnly;
        if (pollOcrChk) pollOcrChk.checked = !!state.ui.pollOcrServer;
      }

      function readLogs() {
        if (typeof window.CANBus?.getLogs === "function") return window.CANBus.getLogs();
        const arr = safeParse(localStorage.getItem(LOG_KEY), []);
        return Array.isArray(arr) ? arr : [];
      }

      function levelEnabled(level) {
        const lv = String(level || "info");
        if (lv === "error") return !!lvlError.checked;
        if (lv === "warn") return !!lvlWarn.checked;
        return !!lvlInfo.checked;
      }

      function filtered() {
        const q = String(searchIn.value || "").trim().toLowerCase();
        const source = String(sourceSel.value || "all");
        const cat = String(categorySel.value || "all");
        const rows = readLogs().slice(-Math.max(1, Number(state.ui.maxRows || 350)));
        return rows.filter((r) => {
          const level = String(r?.level || "info");
          if (!levelEnabled(level)) return false;
          if (source !== "all" && String(r?.source || "") !== source) return false;
          if (cat !== "all" && String(r?.category || "") !== cat) return false;
          if (!q) return true;
          const text = `${r?.type || ""} ${r?.source || ""} ${r?.summary || ""} ${r?.payloadPreview || ""}`.toLowerCase();
          return text.includes(q);
        });
      }

      function esc(v) {
        return String(v ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;");
      }

      function refreshSelectOptions(logs) {
        const srcPrev = String(sourceSel.value || "all");
        const catPrev = String(categorySel.value || "all");
        const srcSet = [...new Set(logs.map((r) => String(r?.source || "")).filter(Boolean))].sort();
        const catSet = [...new Set(logs.map((r) => String(r?.category || "")).filter(Boolean))].sort();
        sourceSel.innerHTML = `<option value="all">${esc(tt("common.all", "All"))}</option>${srcSet.map((s) => `<option value="${esc(s)}">${esc(s)}</option>`).join("")}`;
        categorySel.innerHTML = `<option value="all">${esc(tt("common.all", "All"))}</option>${catSet.map((s) => `<option value="${esc(s)}">${esc(s)}</option>`).join("")}`;
        if ([...sourceSel.options].some((o) => o.value === srcPrev)) sourceSel.value = srcPrev;
        if ([...categorySel.options].some((o) => o.value === catPrev)) categorySel.value = catPrev;
      }

      function render() {
        const allLogs = readLogs();
        refreshSelectOptions(allLogs);
        const rows = filtered();
        const infoCount = rows.filter((r) => String(r?.level || "info") === "info").length;
        const warnCount = rows.filter((r) => String(r?.level || "info") === "warn").length;
        const errCount = rows.filter((r) => String(r?.level || "info") === "error").length;
        countInfo.textContent = `${infoCount} info`;
        countWarn.textContent = `${warnCount} warn`;
        countError.textContent = `${errCount} error`;

        const latest = rows.length ? rows[rows.length - 1] : null;
        statusLine.textContent = latest
          ? `[${new Date(String(latest.ts || "")).toLocaleTimeString()}] ${latest.type || "event"} - ${latest.summary || ""}`
          : tt("logger.empty", "No log entries yet.");

        const syncLatest = [...allLogs].reverse().find((r) => String(r?.type || "") === "data:sync:status");
        const online = !!(syncLatest?.payload && typeof syncLatest.payload === "object" && syncLatest.payload.online);
        onlinePill.textContent = online ? tt("logger.online", "online") : tt("logger.offline", "offline");
        onlinePill.className = `pill ${online ? "info" : "warn"}`;

        if (!rows.length) {
          body.innerHTML = `<tr><td colspan="5" class="muted">${esc(tt("logger.emptyFiltered", "No logs match the current filters."))}</td></tr>`;
        } else {
          body.innerHTML = rows.slice().reverse().map((r) => {
            const ts = new Date(String(r?.ts || "")).toLocaleString();
            const level = String(r?.level || "info");
            const payloadText = String(r?.payloadPreview || "").trim();
            return `
              <tr>
                <td class="mono">${esc(ts)}</td>
                <td><span class="sev ${esc(level)}">${esc(level)}</span></td>
                <td class="mono">${esc(String(r?.type || ""))}</td>
                <td class="mono">${esc(String(r?.source || ""))}</td>
                <td>
                  <div>${esc(String(r?.summary || ""))}</div>
                  ${payloadText ? `<details class="payload"><summary>${esc(tt("logger.payload", "payload"))}</summary><pre>${esc(payloadText)}</pre></details>` : ""}
                </td>
              </tr>
            `;
          }).join("");
        }
        if (state.ui.autoScroll && !state.paused && logWrap) {
          logWrap.scrollTop = 0;
        }
      }

      function toCsv(rows) {
        const escCsv = (v) => {
          const s = String(v ?? "");
          return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
        };
        const head = ["ts", "level", "category", "type", "source", "direction", "summary", "payloadPreview"];
        const lines = [head.join(",")];
        for (const r of rows) {
          lines.push([
            r?.ts,
            r?.level,
            r?.category,
            r?.type,
            r?.source,
            r?.direction,
            r?.summary,
            r?.payloadPreview,
          ].map(escCsv).join(","));
        }
        return lines.join("\n");
      }

      function download(name, data, type) {
        const blob = new Blob([data], { type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function bind() {
        [searchIn, sourceSel, categorySel, lvlInfo, lvlWarn, lvlError].forEach((el) => {
          el?.addEventListener("input", render);
          el?.addEventListener("change", render);
        });

        autoScrollChk?.addEventListener("change", () => {
          state.ui.autoScroll = !!autoScrollChk.checked;
          writeUi();
        });

        pauseBtn?.addEventListener("click", () => {
          state.paused = !state.paused;
          pauseBtn.textContent = state.paused ? tt("logger.resume", "Resume") : tt("logger.pause", "Pause");
        });

        clearBtn?.addEventListener("click", () => {
          if (!confirm(tt("logger.clearConfirm", "Clear log history?"))) return;
          if (window.CANBus?.clearLogs) window.CANBus.clearLogs();
          else localStorage.setItem(LOG_KEY, "[]");
          render();
        });

        exportJsonBtn?.addEventListener("click", () => {
          const rows = filtered();
          download(`vmill_logger_${new Date().toISOString().slice(0,19).replace(/[:T]/g, "-")}.json`, JSON.stringify(rows, null, 2), "application/json");
        });

        exportCsvBtn?.addEventListener("click", () => {
          const rows = filtered();
          download(`vmill_logger_${new Date().toISOString().slice(0,19).replace(/[:T]/g, "-")}.csv`, toCsv(rows), "text/csv");
        });

        exportTxtBtn?.addEventListener("click", () => {
          const rows = filtered();
          const txt = rows.map((r) => `[${r?.ts || ""}] [${r?.level || "info"}] [${r?.source || "?"}] ${r?.type || "event"} :: ${r?.summary || ""}`).join("\n");
          download(`vmill_logger_${new Date().toISOString().slice(0,19).replace(/[:T]/g, "-")}.txt`, txt, "text/plain");
        });

        activeChk?.addEventListener("change", () => {
          state.ui.active = !!activeChk.checked;
          writeUi();
          applyUi();
          render();
        });

        alertOnlyChk?.addEventListener("change", () => {
          state.ui.alertOnly = !!alertOnlyChk.checked;
          writeUi();
          applyUi();
          render();
        });

        posSel?.addEventListener("change", () => {
          state.ui.position = String(posSel.value || "bottom-right");
          writeUi();
          applyUi();
        });

        rowsRange?.addEventListener("input", () => {
          state.ui.maxRows = Math.max(50, Math.min(1200, Number(rowsRange.value || 350)));
          writeUi();
          applyUi();
          render();
        });

        pollOcrChk?.addEventListener("change", () => {
          state.ui.pollOcrServer = !!pollOcrChk.checked;
          writeUi();
          startOcrLogPollingIfEnabled();
        });

        pullOcrLogsBtn?.addEventListener("click", () => {
          void pollOcrServerLogs();
        });

        window.addEventListener("vmill:logger:new", () => {
          if (state.paused) return;
          render();
        });
        window.addEventListener("vmill:logger:cleared", () => {
          if (state.paused) return;
          render();
        });
        window.addEventListener("storage", (e) => {
          if (String(e.key || "") === LOG_KEY && !state.paused) render();
          if (String(e.key || "") === UI_KEY) {
            state.ui = readUi();
            applyUi();
            startOcrLogPollingIfEnabled();
            render();
          }
        });
        window.CANBus?.onMessage?.((msg) => {
          if (!msg || state.paused) return;
          if (String(msg.type || "") === "data:sync:status") render();
        });

        window.addEventListener("vmill:theme:changed", applyTheme);
        window.addEventListener("vmill:lang:changed", () => {
          applyI18n();
          render();
        });

        window.addEventListener("message", (ev) => {
          try {
            if (!ev?.data || ev.data.type !== "vmill:hub:ocrLogPoll") return;
            const on = !!ev.data.value;
            state.ui.pollOcrServer = on;
            if (pollOcrChk) pollOcrChk.checked = on;
            writeUi();
            startOcrLogPollingIfEnabled();
          } catch {}
        });
      }

      state.ui = readUi();
      applyTheme();
      applyUi();
      applyI18n();
      bind();
      startOcrLogPollingIfEnabled();
      render();
    })();
  </script>
</body>
</html>
