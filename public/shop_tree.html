            if (key === "stationid") {
              const opts = [`<option value="">${esc(tt("shop.option.none", "(none)"))}</option>`, ...(state.app.stations || []).map((x) => {
                const id = String(x?.id || "");
                const selected = id === String(raw?.stationId || raw?.nodeId || "") ? "selected" : "";
                return `<option value="${esc(id)}" ${selected}>${esc(itemLabel(x))}</option>`;
              })].join("");
              return `<select data-record-field="stationId">${opts}</select>`;
            }
            if (key === "productid") {
              const opts = [`<option value="">${esc(tt("shop.option.none", "(none)"))}</option>`, ...(state.app.products || []).map((x) => {
                const id = String(x?.id || "");
                const selected = id === String(raw?.productId || "") ? "selected" : "";
                return `<option value="${esc(id)}" ${selected}>${esc(itemLabel(x))}</option>`;
              })].join("");
              return `<select data-record-field="productId">${opts}</select>`;
            }
            if (key === "status") {
              const statusVal = String(raw?.status || "active");
              return `
                <select data-record-field="status">
                  <option value="active" ${statusVal === "active" ? "selected" : ""}>${esc(tt("shop.status.active", "Active"))}</option>
                  <option value="paused" ${statusVal === "paused" ? "selected" : ""}>${esc(tt("shop.status.paused", "Paused"))}</option>
                  <option value="archived" ${statusVal === "archived" ? "selected" : ""}>${esc(tt("shop.status.archived", "Archived"))}</option>
                </select>
              `;
            }
            if (key === "parentproductid") {
              const opts = [`<option value="">${esc(tt("shop.option.none", "(none)"))}</option>`, ...(state.app.products || [])
                .filter((x) => String(x?.id || "") !== rid)
                .map((x) => {
                  const id = String(x?.id || "");
                  const selected = id === String(raw?.parentProductId || "") ? "selected" : "";
                  return `<option value="${esc(id)}" ${selected}>${esc(itemLabel(x))}</option>`;
                })].join("");
              return `<select data-record-field="parentProductId">${opts}</select>`;
            }
            const attrId = String(attr?.id || "");
            const attrType = String(attr?.type || "string").toLowerCase();
            const meta = (raw?.meta && typeof raw.meta === "object") ? raw.meta : {};
            let value = "";
            if (Object.prototype.hasOwnProperty.call(meta, attrId)) value = meta[attrId];
            else if (Object.prototype.hasOwnProperty.call(meta, String(attr?.name || ""))) value = meta[String(attr?.name || "")];
            else value = raw?.[String(attr?.name || "")];
            if (attrType === "boolean") {
              const checked = value === true || value === 1 || String(value).toLowerCase() === "true";
              return `<input data-record-field="attr:${esc(attrId)}" data-attr-type="${esc(attrType)}" type="checkbox" style="width:auto;" ${checked ? "checked" : ""} />`;
            }
            if (attrType === "number") {
              return `<input data-record-field="attr:${esc(attrId)}" data-attr-type="${esc(attrType)}" type="text" inputmode="decimal" value="${esc(value == null ? "" : String(value))}" />`;
            }
            if (attrType === "date") {
              return `<input data-record-field="attr:${esc(attrId)}" data-attr-type="${esc(attrType)}" type="date" value="${esc(value == null ? "" : String(value))}" />`;
            }
            if (attrType === "timestamp") {
              return `<input data-record-field="attr:${esc(attrId)}" data-attr-type="${esc(attrType)}" type="datetime-local" value="${esc(toDateTimeLocalInputValue(value))}" />`;
            }
            return `<input data-record-field="attr:${esc(attrId)}" data-attr-type="${esc(attrType)}" type="text" value="${esc(value == null ? "" : String(value))}" />`;
          };

          if (!Array.isArray(rows) || !rows.length) {
            const emptyCols = displayRecordFields.length + 2;
            return `<tr><td colspan="${emptyCols}"><div class="tiny">${esc(tt("shop.empty.noRecords", "No records"))}</div></td></tr>`;
          }
          return rows.map((raw) => {
            const row = toUiItem(raw);
            const rid = String(row.id || "");
            const parentAssigned = String(linksByRecordId.get(rid) || "");
            const parentSelect = parentTypeId
              ? `<select data-record-field="parentAssign">${parentAssignOptionsFor(parentAssigned)}</select>`
              : `<span class="tiny">${esc(tt("shop.empty.noParentRuleShort", "-"))}</span>`;
            const cells = displayRecordFields
              .map((attr) => `<td>${renderAttrCell(attr, raw, rid)}</td>`)
              .join("");
            return `
              <tr data-record-id="${esc(rid)}" data-record-drag-id="${esc(rid)}" draggable="true">
                ${cells}
                <td>${parentSelect}</td>
                <td><button class="recordDeleteBtn" type="button" data-record-delete-id="${esc(rid)}">${esc(tt("common.delete", "Delete"))}</button></td>
              </tr>
            `;
          }).join("");
        }

        const recordRows = isCore
          ? (Array.isArray(state.app?.[role === "product" ? "products" : (role === "station" ? "stations" : "jobs")])
            ? state.app[role === "product" ? "products" : (role === "station" ? "stations" : "jobs")]
            : [])
          : typeItems;
        const recordHeader = `
          <tr>
            ${recordAttrHeaders}
            <th>${esc(parentAssignColumnTitle)}</th>
            <th>${esc(tt("common.actions", "Actions"))}</th>
          </tr>
        `;

        detailWrap.innerHTML = `
          <section class="section">
            <div class="sectionHead">
              <div></div>
              <div class="tag">${type.base ? esc(tt("shop.tag.base", "base")) : esc(tt("shop.role.custom", "custom"))}</div>
            </div>
            <div class="grid2">
              <div class="field">
                <label>${esc(tt("shop.form.name", "Name"))}</label>
                <input id="typeNameIn" type="text" value="${esc(String(type.nameSingular || ""))}" />
              </div>
              <div class="field">
                <label>${esc(tt("shop.form.parentCategory", "Parent folder"))}</label>
                <select id="typeParentSel">${parentOptions}</select>
              </div>
            </div>
            <div class="grid2">
              <div class="field">
                <label>${esc(tt("shop.form.icon", "Icon"))}</label>
                <div class="fieldInline">
                  <span id="typeIconPreview">${typeVisualHtml({ icon: String(type.icon || ""), imageUrl: "" })}</span>
                  <select id="typeIconSel">${TYPE_ICON_SET.map((opt) => `<option value="${esc(opt.id)}" ${String(type.icon || "") === String(opt.id || "") ? "selected" : ""}>${esc(tt(opt.key, opt.fallback))}</option>`).join("")}</select>
                </div>
              </div>
              <div class="field">
                <label>${esc(tt("shop.form.image", "Image"))}</label>
                <input id="typeImageUrlIn" type="text" value="${esc(String(type.imageUrl || ""))}" placeholder="${esc(tt("shop.form.imagePlaceholder", "Image URL or uploaded file"))}" />
              </div>
            </div>
            <div class="row" style="align-items:center;">
              <div id="typeVisualPreview">${typeVisualHtml(type, "preview")}</div>
              <button class="btn ghost" id="typeImageUploadBtn" type="button">${esc(tt("shop.action.uploadImage", "Upload image"))}</button>
              <button class="btn ghost" id="typeImageClearBtn" type="button">${esc(tt("shop.action.clearImage", "Clear image"))}</button>
              <input id="typeImageFileIn" type="file" accept="image/*" hidden />
            </div>
            <div class="row">
              <button class="btn ghost" id="newChildTypeBtn" type="button">${esc(tt("shop.action.addChild", "+ Subfolder"))}</button>
              <button class="btn warn" id="deleteTypeBtn" type="button">${esc(tt("common.delete", "Delete"))}</button>
            </div>
            <div class="sectionHead">
              <div class="sectionTitle">${esc(tt("shop.form.attributes", "Fields"))}</div>
              <button class="btn ghost" type="button" id="addAttrBtn">${esc(tt("shop.action.addField", "+ Field"))}</button>
            </div>
            <div class="tiny">${esc(tt("shop.form.fieldsCategoryHint", "Fields are defined on this folder schema (not per record row). Parent folder fields are inherited automatically."))}</div>
            <div class="tableWrap">
              <table class="attrTable">
                <thead>
                  <tr>
                    <th>${esc(tt("shop.form.name", "Name"))}</th>
                    <th>${esc(tt("shop.form.type", "Type"))}</th>
                    <th>${esc(tt("shop.form.required", "Required"))}</th>
                    <th>${esc(tt("shop.form.enabled", "Enabled"))}</th>
                    <th>${esc(tt("shop.form.source", "Source"))}</th>
                    <th>${esc(tt("common.actions", "Actions"))}</th>
                  </tr>
                </thead>
                <tbody id="typeAttrBody">
                  ${attributeRows}
                </tbody>
              </table>
            </div>
            <div class="sectionHead" style="margin-top:14px;">
              <div class="sectionTitle">${esc(tt("shop.form.records", "Records"))}</div>
              <button class="btn ghost" type="button" id="newItemBtn">${esc(tt("shop.action.addRecord", "+ Record"))}</button>
            </div>
            ${parentTypeId ? "" : `<div class="tiny">${esc(tt("shop.empty.noParentRule", "No parent folder configured for this one. Set parent folder above first."))}</div>`}
            ${parentDropTargets}
            <div class="tableWrap">
              <table class="recordsTable">
                <thead>${recordHeader}</thead>
                <tbody>
                  ${tableRecordRows(recordRows)}
                </tbody>
              </table>
            </div>
          </section>
        `;
        updateTypeVisualPreview();
      }

      function syncParentRule(typeId, parentTypeId, relation) {
        if (!window.VMillData?.listStructureRules || !window.VMillData?.deleteStructureRule || !window.VMillData?.upsertStructureRule) return;
        const childId = String(typeId || "");
        const parentId = String(parentTypeId || "");
        const rel = normalizeRelation(relation);
        if (!childId) return;
        const existing = window.VMillData.listStructureRules({ childTypeId: childId }) || [];
        if (!parentId || parentId === childId) {
          for (const row of existing) window.VMillData.deleteStructureRule(row.id);
          return;
        }
        let keep = false;
        for (const row of existing) {
          const same = String(row?.parentTypeId || "") === parentId && String(row?.relation || "") === rel;
          if (same) {
            keep = true;
            continue;
          }
          window.VMillData.deleteStructureRule(row.id);
        }
        if (!keep) {
          window.VMillData.upsertStructureRule({
            parentTypeId: parentId,
            childTypeId: childId,
            relation: rel,
            label: `${parentId} ${rel} ${childId}`,
          });
        }
      }

      function findType(typeId) {
        return (state.types || []).find((x) => String(x?.id || "") === String(typeId || "")) || null;
      }

      function remapCoreRole(selectedTypeId, wantedRole) {
        const role = String(wantedRole || "custom").trim().toLowerCase();
        const sid = String(selectedTypeId || "");
        if (!sid) return;
        const core = new Set(["product", "station", "job"]);
        if (!core.has(role)) return;
        for (const t of (state.types || [])) {
          const tid = String(t?.id || "");
          if (!tid || tid === sid) continue;
          const trole = String(t?.moduleRole || "custom").trim().toLowerCase();
          if (trole !== role) continue;
          window.VMillData.upsertEntityType({
            ...t,
            id: tid,
            moduleRole: "custom",
            nameSingular: String(t?.nameSingular || tid),
            namePlural: String(t?.namePlural || autoPluralName(String(t?.nameSingular || tid))),
          });
        }
      }

      async function createType(parentTypeId = "") {
        const upsertType = window.VMillData?.upsertEntityType;
        if (typeof upsertType !== "function") return;
        const nameInput = prompt(tt("shop.prompt.name", "Folder name:"), tt("shop.prompt.defaultName", "New Folder"));
        if (nameInput == null) return;
        const name = String(nameInput || "").trim();
        if (!name) return;
        const out = upsertType({
          nameSingular: name,
          namePlural: autoPluralName(name),
          moduleRole: "custom",
          icon: "folder",
        });
        const typeId = String(out?.id || "");
        if (!typeId) return;
        syncParentRule(typeId, parentTypeId, "contains");
        state.selectedTypeId = typeId;
        state.expanded.add(String(parentTypeId || ""));
        emitTreeChanged("type-create");
        await loadAll({ silent: true });
        flashSaved();
      }

      async function renameType(typeId) {
        const row = findType(typeId);
        if (!row) return;
        const nextName = prompt(tt("shop.prompt.name", "Folder name:"), String(row.nameSingular || ""));
        if (nextName == null) return;
        const name = String(nextName || "").trim();
        if (!name) return;
        const out = window.VMillData.upsertEntityType({
          ...row,
          id: row.id,
          nameSingular: name,
          namePlural: autoPluralName(name),
          moduleRole: String(row.moduleRole || "custom"),
        });
        if (!out?.id) return;
        state.selectedTypeId = String(out.id || row.id);
        emitTreeChanged("type-rename");
        await loadAll({ silent: true });
        flashSaved();
      }

      async function saveTypeFromForm() {
        const typeId = String(state.selectedTypeId || "");
        const row = findType(typeId);
        if (!row) return;
        const readAttrRows = () => {
          const body = document.getElementById("typeAttrBody");
          if (!(body instanceof HTMLElement)) return [];
          const rows = Array.from(body.querySelectorAll('[data-type-attr-row][data-attr-origin="own"]'));
          const out = [];
          let order = 0;
          for (const tr of rows) {
            if (!(tr instanceof HTMLElement)) continue;
            const attrId = String(tr.getAttribute("data-attr-id") || makeId("attr"));
            const name = String(tr.querySelector('[data-attr-field="name"]')?.value || "").trim();
            const type = String(tr.querySelector('[data-attr-field="type"]')?.value || "string").trim().toLowerCase();
            const required = !!tr.querySelector('[data-attr-field="required"]')?.checked;
            const enabled = !!tr.querySelector('[data-attr-field="enabled"]')?.checked;
            if (!name) continue;
            out.push({ id: attrId, name, type, required, enabled, order, key: name });
            order += 1;
          }
          return normalizeTypeAttributes(out);
        };
        const name = String(document.getElementById("typeNameIn")?.value || row.nameSingular || "").trim();
        if (!name) return;
        const parentTypeId = String(document.getElementById("typeParentSel")?.value || "");
        const icon = String(document.getElementById("typeIconSel")?.value || row.icon || "").trim();
        const imageUrl = String(document.getElementById("typeImageUrlIn")?.value || row.imageUrl || "").trim();
        const relation = "contains";
        const rowRole = String(row.moduleRole || "custom").trim().toLowerCase() || "custom";
        const role = rowRole;
        const attributes = readAttrRows();
        remapCoreRole(row.id, role);
        const out = window.VMillData.upsertEntityType({
          ...row,
          id: row.id,
          nameSingular: name,
          namePlural: autoPluralName(name),
          moduleRole: role,
          icon,
          imageUrl,
          attributes,
        });
        if (!out?.id) return;
        syncParentRule(String(out.id || row.id), parentTypeId, relation);
        state.selectedTypeId = String(out.id || row.id);
        emitTreeChanged("type-save");
        await loadAll({ silent: true });
        flashSaved();
      }

      async function deleteType(typeId) {
        const id = String(typeId || state.selectedTypeId || "");
        if (!id) return;
        const row = findType(id);
        if (!row) return;
        if (!confirm(tt("shop.confirm.delete", "Delete folder \"{name}\"?", { name: row.nameSingular || id }))) return;
        const ok = !!window.VMillData.deleteEntityType?.(id);
        if (!ok) {
          alert(tt("shop.error.deleteBlockedDetails", "Delete blocked: folder still required by data or protected mapping."));
          return;
        }
        if (String(state.selectedTypeId || "") === id) state.selectedTypeId = "";
        emitTreeChanged("type-delete");
        await loadAll({ silent: true });
        flashSaved(tt("shop.status.deleted", "Deleted ✓"));
      }

      async function createItemForType() {
        const type = selectedType();
        if (!type) return;
        const role = String(type.moduleRole || "custom").toLowerCase();
        const defaultMeta = defaultRecordMetaForType(type);
        if (role === "product" || role === "station" || role === "job") {
          const id = upsertAppRow(role, { meta: defaultMeta });
          if (id) state.selectedItemByType[String(type.id || "")] = id;
          emitTreeChanged("record-create");
          await loadAll({ silent: true });
          flashSaved();
          return;
        }
        const out = window.VMillData?.upsertEntityItem?.({
          typeId: String(type.id || ""),
          code: "",
          name: tt("shop.item.defaultName", "New Record"),
          meta: defaultMeta,
        });
        if (!out?.id) return;
        state.selectedItemByType[String(type.id || "")] = String(out.id || "");
        emitTreeChanged("record-create");
        await loadAll({ silent: true });
        flashSaved();
      }

      async function saveRecordInline(recordId, rowEl) {
        const type = selectedType();
        if (!type || !(rowEl instanceof HTMLElement)) return;
        const typeId = String(type.id || "");
        const role = String(type.moduleRole || "custom").toLowerCase();
        const itemId = String(recordId || "");
        if (!itemId) return;
        const getVal = (field) => String(rowEl.querySelector(`[data-record-field="${field}"]`)?.value || "").trim();
        const parentAssignedId = getVal("parentAssign");
        const attrs = recordAttributesForType(type);
        const visibleFields = displayRecordFieldsForType(type);
        const visibleFieldKeys = new Set(
          visibleFields
            .map((x) => canonicalFieldKey(x?.key || x?.name || ""))
            .filter(Boolean),
        );

        if (role === "product" || role === "station" || role === "job") {
          const roleRows = role === "product"
            ? (state.app.products || [])
            : (role === "station" ? (state.app.stations || []) : (state.app.jobs || []));
          const existingRow = roleRows.find((x) => String(x?.id || "") === itemId) || null;
          const baseMeta = (existingRow?.meta && typeof existingRow.meta === "object") ? existingRow.meta : {};
          const nextMeta = readRecordAttrMeta(rowEl, attrs, baseMeta);
          const payload = { id: itemId };
          payload.name = visibleFieldKeys.has("name")
            ? getVal("name")
            : String(existingRow?.name || "");
          if (role !== "job") {
            payload.code = visibleFieldKeys.has("code")
              ? getVal("code")
              : String(existingRow?.code || "");
          }
          if (role === "product") {
            payload.parentProductId = visibleFieldKeys.has("parentproductid")
              ? getVal("parentProductId")
              : String(existingRow?.parentProductId || "");
          }
          if (role === "job") {
            payload.stationId = visibleFieldKeys.has("stationid")
              ? getVal("stationId")
              : String(existingRow?.stationId || existingRow?.nodeId || "");
            payload.nodeId = payload.stationId;
            payload.productId = visibleFieldKeys.has("productid")
              ? getVal("productId")
              : String(existingRow?.productId || "");
            payload.status = visibleFieldKeys.has("status")
              ? (getVal("status") || "active")
              : String(existingRow?.status || "active");
          }
          payload.meta = nextMeta;
          const savedId = upsertAppRow(role, payload);
          if (!savedId) return;
          applyParentAssignmentFor(typeId, String(savedId || ""), parentAssignedId);
          emitTreeChanged("record-save-inline");
          await loadAll({ silent: true });
          flashSaved();
          return;
        }

        const existing = listTypeItems(typeId).find((x) => String(x?.id || "") === itemId) || null;
        const code = visibleFieldKeys.has("code")
          ? getVal("code")
          : String(existing?.code || "");
        const name = visibleFieldKeys.has("name")
          ? getVal("name")
          : String(existing?.name || "");
        const baseMeta = (existing?.meta && typeof existing.meta === "object") ? existing.meta : {};
        const nextMeta = readRecordAttrMeta(rowEl, attrs, baseMeta);
        const out = window.VMillData?.upsertEntityItem?.({
          typeId,
          id: itemId,
          code: code || String(existing?.code || ""),
          name: name || code || tt("shop.item.defaultName", "New Record"),
          meta: nextMeta,
        });
        if (!out?.id) return;
        applyParentAssignmentFor(typeId, String(out.id || ""), parentAssignedId);
        emitTreeChanged("record-save-inline");
        await loadAll({ silent: true });
        flashSaved();
      }

      async function deleteRecordById(recordId) {
        const type = selectedType();
        if (!type) return;
        const typeId = String(type.id || "");
        const role = String(type.moduleRole || "custom").toLowerCase();
        const itemId = String(recordId || "");
        if (!itemId) return;
        if (!confirm(tt("shop.confirm.deleteRecord", "Delete selected record?"))) return;
        let ok = false;
        if (role === "product" || role === "station" || role === "job") {
          ok = deleteAppRow(role, itemId);
        } else {
          ok = !!window.VMillData?.deleteEntityItem?.(typeId, itemId);
        }
        if (!ok) {
          alert(tt("shop.error.deleteRecordBlocked", "Delete blocked for this record."));
          return;
        }
        state.selectedItemByType[typeId] = "";
        emitTreeChanged("record-delete");
        await loadAll({ silent: true });
        flashSaved(tt("shop.status.deleted", "Deleted ✓"));
      }

      async function moveRecordParentByDrop(recordId, parentId) {
        const rid = String(recordId || "");
        if (!rid) return;
        const rowEl = detailWrap.querySelector(`tr[data-record-id="${rid}"]`);
        if (!(rowEl instanceof HTMLElement)) return;
        const sel = rowEl.querySelector('[data-record-field="parentAssign"]');
        if (!(sel instanceof HTMLSelectElement)) return;
        sel.value = String(parentId || "");
        await saveRecordInline(rid, rowEl);
      }

      function applyParentAssignmentFor(typeId, itemId, selectedParentId = "") {
        const tid = String(typeId || "");
        const iid = String(itemId || "");
        if (!tid || !iid) return false;
        const rule = incomingRule(tid);
        const parentTypeId = String(rule?.parentTypeId || "");
        if (!parentTypeId) return false;
        const relation = normalizeRelation(String(rule?.relation || "contains"));
        const parentId = String(selectedParentId || "");
        const links = window.VMillData?.listEntityLinks?.({ toTypeId: tid, toId: iid }) || [];
        for (const link of links) {
          if (String(link?.fromTypeId || "") === parentTypeId) {
            window.VMillData?.deleteEntityLink?.(String(link?.id || ""));
          }
        }
        if (parentId) {
          window.VMillData?.upsertEntityLink?.({
            fromTypeId: parentTypeId,
            fromId: parentId,
            toTypeId: tid,
            toId: iid,
            relation,
          });
        }
        return true;
      }

      function queueLoad(silent = true) {
        state.loadSilent = state.loadSilent && !!silent;
        if (state.loadTimer) return;
        state.loadTimer = window.setTimeout(() => {
          const runSilent = state.loadSilent;
          state.loadTimer = 0;
          state.loadSilent = true;
          void loadAll({ silent: runSilent });
        }, 90);
      }

      async function loadAll(opts = {}) {
        const silent = opts && opts.silent === true;
        if (!silent) {
          state.loading = true;
          state.error = "";
          renderTree();
        }
        try {
          const model = window.VMillData?.readStructureModel
            ? window.VMillData.readStructureModel({ persist: false })
            : { types: [], items: [], links: [], rules: [] };
          const app = window.VMillData?.readAppState
            ? (window.VMillData.readAppState({ seedIfMissing: true }) || { products: [], stations: [], jobs: [] })
            : { products: [], stations: [], jobs: [] };
          state.types = Array.isArray(model?.types) ? model.types.slice() : [];
          state.items = Array.isArray(model?.items) ? model.items.slice() : [];
          state.links = Array.isArray(model?.links) ? model.links.slice() : [];
          state.rules = Array.isArray(model?.rules) ? model.rules.slice() : [];
          state.app = {
            products: Array.isArray(app?.products) ? app.products.slice() : [],
            stations: Array.isArray(app?.stations) ? app.stations.slice() : [],
            jobs: Array.isArray(app?.jobs) ? app.jobs.slice() : [],
          };
          if (!state.selectedTypeId || !state.types.some((x) => String(x?.id || "") === String(state.selectedTypeId || ""))) {
            const defaultId = String(window.VMillData?.resolveEntityTypeIdByRole?.("product") || state.types[0]?.id || "");
            state.selectedTypeId = defaultId;
          }
          for (const t of state.types) {
            const id = String(t?.id || "");
            if (id) state.expanded.add(id);
          }
          state.error = "";
        } catch (err) {
          state.error = String(err?.message || tt("shop.error.load", "Failed to load structure model."));
        } finally {
          state.loading = false;
          renderTree();
          renderDetail();
        }
      }

      treeWrap.addEventListener("click", async (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;

        const toggleId = target.closest("[data-toggle-type]")?.getAttribute("data-toggle-type") || "";
        if (toggleId) {
          if (state.expanded.has(toggleId)) state.expanded.delete(toggleId);
          else state.expanded.add(toggleId);
          renderTree();
          return;
        }

        const addChildId = target.closest("[data-add-child]")?.getAttribute("data-add-child") || "";
        if (addChildId) {
          await createType(addChildId);
          return;
        }

        const renameId = target.closest("[data-rename-type]")?.getAttribute("data-rename-type") || "";
        if (renameId) {
          await renameType(renameId);
          return;
        }

        const deleteId = target.closest("[data-delete-type]")?.getAttribute("data-delete-type") || "";
        if (deleteId) {
          await deleteType(deleteId);
          return;
        }

        const selectId = target.closest("[data-select-type]")?.getAttribute("data-select-type") || "";
        if (selectId) {
          state.selectedTypeId = selectId;
          renderTree();
          renderDetail();
        }
      });

      treeWrap.addEventListener("dragstart", (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.closest("button, input, select, textarea")) {
          e.preventDefault();
          return;
        }
        const node = target.closest("[data-drag-type]");
        if (!(node instanceof HTMLElement)) return;
        const typeId = String(node.getAttribute("data-drag-type") || "");
        if (!typeId) return;
        state.dragTypeId = typeId;
        node.classList.add("dragging");
        if (e.dataTransfer) {
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("text/plain", typeId);
        }
      });

      treeWrap.addEventListener("dragover", (e) => {
        if (!String(state.dragTypeId || "")) return;
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        const dropNode = target.closest("[data-drop-type],[data-drop-root]");
        if (!(dropNode instanceof HTMLElement)) return;
        const dropType = String(dropNode.getAttribute("data-drop-type") || "");
        if (dropType && dropType === String(state.dragTypeId || "")) return;
        e.preventDefault();
        if (e.dataTransfer) e.dataTransfer.dropEffect = "move";
        clearTreeDropUi();
        dropNode.classList.add("dropOver");
        if (dropNode.hasAttribute("data-drop-root")) dropNode.classList.add("dragOver");
      });

      treeWrap.addEventListener("drop", async (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        const dropNode = target.closest("[data-drop-type],[data-drop-root]");
        if (!(dropNode instanceof HTMLElement)) return;
        e.preventDefault();
        const dragged = String(state.dragTypeId || (e.dataTransfer ? e.dataTransfer.getData("text/plain") : "") || "");
        const parentId = String(dropNode.getAttribute("data-drop-type") || "");
        clearTreeDropUi();
        state.dragTypeId = "";
        if (!dragged) return;
        await moveTypeToParent(dragged, parentId);
      });

      treeWrap.addEventListener("dragend", () => {
        clearTreeDropUi();
        state.dragTypeId = "";
      });

      detailWrap.addEventListener("click", async (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;

        if (target.id === "addAttrBtn") {
          const body = document.getElementById("typeAttrBody");
          if (body) {
            const emptyRow = body.querySelector("tr:not([data-type-attr-row])");
            if (emptyRow && emptyRow.parentElement) emptyRow.parentElement.removeChild(emptyRow);
            const attrId = makeId("attr");
            const tr = document.createElement("tr");
            tr.setAttribute("data-type-attr-row", "");
            tr.setAttribute("data-attr-origin", "own");
            tr.setAttribute("data-attr-id", attrId);
            tr.setAttribute("data-attr-core", "0");
            tr.setAttribute("data-attr-key", "");
            tr.setAttribute("draggable", "true");
            tr.innerHTML = `
              <td><input data-attr-field="name" type="text" value="" /></td>
              <td>
                <select data-attr-field="type">
                  <option value="string" selected>string</option>
                  <option value="number">number</option>
                  <option value="boolean">boolean</option>
                  <option value="date">date</option>
                  <option value="timestamp">timestamp</option>
                  <option value="text">text</option>
                </select>
              </td>
              <td><input data-attr-field="required" type="checkbox" style="width:auto;" /></td>
              <td><input data-attr-field="enabled" type="checkbox" style="width:auto;" checked /></td>
              <td>${esc(tt("shop.form.sourceOwn", "Current"))}</td>
              <td>
                <div class="attrActions">
                  <button class="attrMoveBtn" type="button" data-move-attr="${esc(attrId)}" data-dir="up" title="${esc(tt("shop.action.moveUp", "Move up"))}">↑</button>
                  <button class="attrMoveBtn" type="button" data-move-attr="${esc(attrId)}" data-dir="down" title="${esc(tt("shop.action.moveDown", "Move down"))}">↓</button>
                  <button class="recordDeleteBtn" type="button" data-delete-attr-id="${esc(attrId)}">${esc(tt("common.delete", "Delete"))}</button>
                </div>
              </td>
            `;
            body.appendChild(tr);
            const input = tr.querySelector('[data-attr-field="name"]');
            if (input instanceof HTMLElement) input.focus();
          }
          return;
        }

        const moveAttrBtn = target.closest("[data-move-attr]");
        if (moveAttrBtn) {
          const body = document.getElementById("typeAttrBody");
          if (!(body instanceof HTMLElement)) return;
          const attrId = String(moveAttrBtn.getAttribute("data-move-attr") || "");
          const dir = String(moveAttrBtn.getAttribute("data-dir") || "");
          if (!attrId || !dir) return;
          const ownRows = Array.from(body.querySelectorAll('[data-type-attr-row][data-attr-origin="own"]'));
          const curIdx = ownRows.findIndex((row) => String(row.getAttribute("data-attr-id") || "") === attrId);
          if (curIdx < 0) return;
          const nextIdx = dir === "up" ? curIdx - 1 : curIdx + 1;
          if (nextIdx < 0 || nextIdx >= ownRows.length) return;
          const row = ownRows[curIdx];
          const targetRow = ownRows[nextIdx];
          if (!(row instanceof HTMLElement) || !(targetRow instanceof HTMLElement)) return;
          if (dir === "up") body.insertBefore(row, targetRow);
          else body.insertBefore(row, targetRow.nextSibling);
          await saveTypeFromForm();
          return;
        }

        const delAttrBtn = target.closest("[data-delete-attr-id]");
        if (delAttrBtn) {
          const row = delAttrBtn.closest("[data-type-attr-row]");
          if (row && row.parentElement) row.parentElement.removeChild(row);
          await saveTypeFromForm();
          return;
        }

        if (target.id === "newTypeBtn") { await createType(""); return; }
        if (target.id === "newChildTypeBtn") { await createType(state.selectedTypeId); return; }
        if (target.id === "deleteTypeBtn") { await deleteType(state.selectedTypeId); return; }
        if (target.id === "newItemBtn") { await createItemForType(); return; }
        const deleteRecordId = String(target.closest("[data-record-delete-id]")?.getAttribute("data-record-delete-id") || "");
        if (deleteRecordId) {
          await deleteRecordById(deleteRecordId);
          return;
        }
      });

      detailWrap.addEventListener("dragstart", (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.closest("input, select, textarea, button")) {
          e.preventDefault();
          return;
        }
        const recordRow = target.closest("tr[data-record-id][data-record-drag-id]");
        if (recordRow instanceof HTMLElement) {
          const recordId = String(recordRow.getAttribute("data-record-drag-id") || "");
          if (!recordId) return;
          state.dragRecordId = recordId;
          recordRow.classList.add("dragging");
          if (e.dataTransfer) {
            e.dataTransfer.effectAllowed = "move";
            e.dataTransfer.setData("text/plain", recordId);
          }
          return;
        }
        const row = target.closest('tr[data-type-attr-row][data-attr-origin="own"]');
        if (!(row instanceof HTMLElement)) return;
        const attrId = String(row.getAttribute("data-attr-id") || "");
        if (!attrId) return;
        state.dragAttrId = attrId;
        row.classList.add("dragging");
        if (e.dataTransfer) {
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("text/plain", attrId);
        }
      });

      detailWrap.addEventListener("dragover", (e) => {
        if (String(state.dragRecordId || "")) {
          const target = e.target;
          if (!(target instanceof HTMLElement)) return;
          const targetRow = target.closest("tr[data-record-id]");
          const targetChip = target.closest("[data-record-parent-drop]");
          if (!(targetRow instanceof HTMLElement) && !(targetChip instanceof HTMLElement)) return;
          const sid = String(state.dragRecordId || "");
          if (targetRow instanceof HTMLElement) {
            const tid = String(targetRow.getAttribute("data-record-id") || "");
            if (!tid || tid === sid) return;
          }
          e.preventDefault();
          if (e.dataTransfer) e.dataTransfer.dropEffect = "move";
          clearRecordDropUi();
          if (targetRow instanceof HTMLElement) targetRow.classList.add("recordDragOver");
          if (targetChip instanceof HTMLElement) targetChip.classList.add("dropOver");
          return;
        }
      });

      detailWrap.addEventListener("drop", async (e) => {
        if (!String(state.dragRecordId || "")) return;
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        e.preventDefault();
        const sourceId = String(state.dragRecordId || (e.dataTransfer ? e.dataTransfer.getData("text/plain") : "") || "");
        const type = selectedType();
        const typeId = String(type?.id || "");
        const parentRule = incomingRule(typeId);
        const parentTypeId = String(parentRule?.parentTypeId || "");
        const targetChip = target.closest("[data-record-parent-drop]");
        const targetRow = target.closest("tr[data-record-id]");
        clearRecordDropUi();
        state.dragRecordId = "";
        if (!sourceId || !parentTypeId) return;
        if (targetChip instanceof HTMLElement) {
          const parentId = String(targetChip.getAttribute("data-record-parent-drop") || "");
          await moveRecordParentByDrop(sourceId, parentId);
          return;
        }
        if (!(targetRow instanceof HTMLElement)) return;
        const targetId = String(targetRow.getAttribute("data-record-id") || "");
        if (!targetId || targetId === sourceId) return;
        let parentId = "";
        if (parentTypeId === typeId) {
          parentId = targetId;
        } else {
          const targetSel = targetRow.querySelector('[data-record-field="parentAssign"]');
          parentId = targetSel instanceof HTMLSelectElement ? String(targetSel.value || "") : "";
        }
        await moveRecordParentByDrop(sourceId, parentId);
      });

      detailWrap.addEventListener("dragend", () => {
        clearRecordDropUi();
        state.dragRecordId = "";
      });

      detailWrap.addEventListener("dragover", (e) => {
        if (!String(state.dragAttrId || "")) return;
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        const row = target.closest('tr[data-type-attr-row][data-attr-origin="own"]');
        if (!(row instanceof HTMLElement)) return;
        const rid = String(row.getAttribute("data-attr-id") || "");
        if (!rid || rid === String(state.dragAttrId || "")) return;
        e.preventDefault();
        if (e.dataTransfer) e.dataTransfer.dropEffect = "move";
        clearAttrDropUi();
        row.classList.add("attrDragOver");
      });

      detailWrap.addEventListener("drop", async (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        const row = target.closest('tr[data-type-attr-row][data-attr-origin="own"]');
        if (!(row instanceof HTMLElement)) return;
        e.preventDefault();
        const sourceId = String(state.dragAttrId || (e.dataTransfer ? e.dataTransfer.getData("text/plain") : "") || "");
        if (!sourceId) return;
        const sourceRow = Array.from(detailWrap.querySelectorAll('tr[data-type-attr-row][data-attr-origin="own"]'))
          .find((el) => String(el.getAttribute("data-attr-id") || "") === sourceId);
        if (!(sourceRow instanceof HTMLElement) || sourceRow === row || !row.parentElement) {
          clearAttrDropUi();
          state.dragAttrId = "";
          return;
        }
        const rect = row.getBoundingClientRect();
        const insertAfter = Number(e.clientY || 0) > (rect.top + (rect.height / 2));
        if (insertAfter) row.parentElement.insertBefore(sourceRow, row.nextSibling);
        else row.parentElement.insertBefore(sourceRow, row);
        clearAttrDropUi();
        state.dragAttrId = "";
        await saveTypeFromForm();
      });

      detailWrap.addEventListener("dragend", () => {
        clearAttrDropUi();
        state.dragAttrId = "";
      });

      detailWrap.addEventListener("change", async (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        if (
          target.id === "typeNameIn"
          || target.id === "typeParentSel"
          || target.id === "typeIconSel"
          || target.id === "typeImageUrlIn"
        ) {
          updateTypeVisualPreview();
          await saveTypeFromForm();
          return;
        }
        if (target.hasAttribute("data-record-field")) {
          const rowEl = target.closest("tr[data-record-id]");
          const rowId = String(rowEl?.getAttribute("data-record-id") || "");
          if (!rowId || !(rowEl instanceof HTMLElement)) return;
          await saveRecordInline(rowId, rowEl);
          return;
        }
        if (target.hasAttribute("data-attr-field")) {
          await saveTypeFromForm();
          return;
        }
      });

      detailWrap.addEventListener("keydown", (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.id === "typeNameIn" && e.key === "Enter") {
          e.preventDefault();
          target.blur();
          return;
        }
        if (!target.hasAttribute("data-record-field") && !target.hasAttribute("data-attr-field")) return;
        if (e.key !== "Enter") return;
        if (target instanceof HTMLTextAreaElement) return;
        e.preventDefault();
        target.blur();
      });

      detailWrap.addEventListener("input", (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.id === "typeIconSel" || target.id === "typeImageUrlIn") {
          updateTypeVisualPreview();
        }
      });

      addRootBtn?.addEventListener("click", async () => { await createType(""); });
      refreshBtn?.addEventListener("click", async () => { await loadAll(); });
      openHubBtn?.addEventListener("click", () => { location.href = "./vmill_hub.html"; });
      detailWrap.addEventListener("click", (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.id === "typeImageUploadBtn") {
          detailWrap.querySelector("#typeImageFileIn")?.click();
          return;
        }
        if (target.id === "typeImageClearBtn") {
          const input = detailWrap.querySelector("#typeImageUrlIn");
          if (input instanceof HTMLInputElement) {
            input.value = "";
            void saveTypeFromForm();
          }
        }
      });
      detailWrap.addEventListener("change", (e) => {
        const target = e.target;
        if (!(target instanceof HTMLInputElement)) return;
        if (target.id !== "typeImageFileIn") return;
        const file = target.files && target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          const input = detailWrap.querySelector("#typeImageUrlIn");
          if (input instanceof HTMLInputElement) {
            input.value = String(reader.result || "");
            updateTypeVisualPreview();
            void saveTypeFromForm();
          }
        };
        reader.readAsDataURL(file);
      });
      searchIn?.addEventListener("input", () => {
        state.search = String(searchIn.value || "");
        renderTree();
      });

      window.CANBus?.onMessage((msg) => {
        const type = String(msg?.type || "");
        if (type === "data:sync:status") return;
        if (type === "data:module:updated" || type === "data:app:updated" || type === "shop:tree:changed") {
          queueLoad(true);
        }
      });

      window.addEventListener("storage", (e) => {
        const k = String(e.key || "");
        if (k === "vmill:auth:token" && !window.VMillAuth?.isLoggedIn?.()) {
          location.replace("./login.html");
          return;
        }
        if (k === "vmill:module-data:v1" || k === "vmill:app-state:v1") {
          queueLoad(true);
        }
      });

      applyTexts();
      applyTheme();
      window.addEventListener("vmill:theme:changed", applyTheme);
      window.addEventListener("vmill:lang:changed", () => {
        applyTexts();
        renderTree();
        renderDetail();
      });

      await loadAll();
    });
  </script>
</body>
</html>
