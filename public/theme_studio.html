<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Theme Studio</title>
  <style>
    :root{
      --bg:var(--vm-theme-bg, #0a0f17);
      --panel:var(--vm-theme-panel, #111a2a);
      --panel2:var(--vm-theme-panel-2, #0f1623);
      --text:var(--vm-theme-text, #e6edf8);
      --muted:var(--vm-theme-muted, rgba(230,237,248,.65));
      --border:var(--vm-theme-border, rgba(230,237,248,.2));
      --accent:var(--vm-theme-accent, #57b4ff);
      --accent-rgb:var(--vm-theme-accent-rgb, 87,180,255);
      --warn:var(--vm-theme-warn, #ffd37a);
      --warn-rgb:var(--vm-theme-warn-rgb, 255,211,122);
    }
    *{box-sizing:border-box}
    html, body { height: 100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 520px at 12% -12%, rgba(var(--accent-rgb), .22), transparent 62%),
        linear-gradient(180deg,var(--bg),color-mix(in srgb, var(--bg) 84%, #000));
      min-height:100dvh;
      overflow-x:hidden;
      overflow-y:auto;
    }
    .wrap{
      width:100%;
      max-width:none;
      margin:0;
      padding:18px 14px 26px;
      min-height:100dvh;
    }
    .hero{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:14px;}
    h1{margin:0;font-size:34px;letter-spacing:.02em}
    .sub{color:var(--muted);font-size:13px;margin-top:7px}
    .card{
      border:1px solid var(--border);
      border-radius:14px;
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      padding:12px;
      margin-bottom:12px;
    }
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
    label{font-size:11px;color:var(--muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
    input,button{
      width:100%;
      border-radius:10px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      color:var(--text);
      padding:10px;
      font-size:13px;
    }
    input[type="color"]{height:42px;padding:4px}
    button{cursor:pointer;font-weight:700}
    .btn{width:auto;padding:10px 12px}
    .btn.primary{border-color:rgba(var(--accent-rgb), .55);background:rgba(var(--accent-rgb), .16);color:var(--accent)}
    .btn.warn{border-color:rgba(var(--warn-rgb), .55);background:rgba(var(--warn-rgb), .14);color:var(--warn)}
    .preset{border:1px solid var(--border);border-radius:10px;padding:8px;cursor:pointer;background:rgba(255,255,255,.02)}
    .preset .name{font-size:11px;font-weight:700;margin-bottom:6px}
    .chips{display:flex;gap:6px}
    .chip{width:18px;height:18px;border-radius:999px;border:1px solid rgba(255,255,255,.2)}
    .preview{
      border:1px solid var(--border);
      border-radius:12px;
      overflow:hidden;
      background:var(--bg);
    }
    .pvHead{
      display:flex;align-items:center;justify-content:space-between;
      padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.08);
      background:var(--header-bg,#101521);color:var(--header-text,#e8e8e8);
    }
    .pvBody{padding:12px;background:linear-gradient(180deg,var(--panel),var(--panel2))}
    .pvBtn{display:inline-block;padding:8px 10px;border-radius:10px;border:1px solid rgba(var(--accent-rgb), .45);background:rgba(var(--accent-rgb), .14);color:var(--accent);font-size:12px;font-weight:700}
    .status{font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1 id="themeTitle">Theme Studio</h1>
        <div class="sub" id="themeSub">Global theme module for Hub, Chrono, SPaCial and Camera.</div>
      </div>
      <div class="row">
        <button class="btn warn" id="resetBtn" type="button">Reset Default</button>
        <button class="btn primary" id="saveBtn" type="button">Save Global Theme</button>
      </div>
    </div>

    <section class="card">
      <div id="presetTitle" style="font-size:12px;font-weight:800;margin-bottom:8px;">Presets</div>
      <div class="row" id="presetRow"></div>
    </section>

    <section class="card">
      <div id="paletteTitle" style="font-size:12px;font-weight:800;margin-bottom:8px;">Palette</div>
      <div class="grid">
        <div><label id="lblBgIn" for="bgIn">Background</label><input id="bgIn" type="color" value="#0a0f17" /></div>
        <div><label id="lblTextIn" for="textIn">Text</label><input id="textIn" type="color" value="#e6edf8" /></div>
        <div><label id="lblAccentIn" for="accentIn">Accent</label><input id="accentIn" type="color" value="#57b4ff" /></div>
        <div><label id="lblHeaderBgIn" for="headerBgIn">Header BG</label><input id="headerBgIn" type="color" value="#101521" /></div>
        <div><label id="lblHeaderTextIn" for="headerTextIn">Header Text</label><input id="headerTextIn" type="color" value="#e8e8e8" /></div>
      </div>
      <div class="row" style="margin-top:10px;">
        <button class="btn" id="applyLiveBtn" type="button">Apply Live</button>
        <span class="status" id="status">Ready.</span>
      </div>
    </section>

    <section class="card">
      <div id="previewTitle" style="font-size:12px;font-weight:800;margin-bottom:8px;">Preview</div>
      <div class="preview" id="preview">
        <div class="pvHead"><strong id="pvHeadTitle">Header</strong><span id="pvHeadSub">Theme Studio</span></div>
        <div class="pvBody">
          <div id="pvBodyTitle" style="font-size:14px;font-weight:700;margin-bottom:7px;">Module Surface</div>
          <div id="pvBodySub" style="font-size:12px;color:var(--muted);margin-bottom:10px;">This preview reflects the global theme variables.</div>
          <span id="pvBtnTxt" class="pvBtn">Accent Action</span>
        </div>
      </div>
    </section>
  </div>

  <script src="./modules/module-shell.js"></script>
  <script src="./modules/module-io.js"></script>
  <script src="./modules/module-data.js"></script>
  <script src="./modules/module-auth.js"></script>
  <script src="./modules/module-lang.js"></script>
  <script src="./modules/module-theme.js"></script>
  <script>
    (function(){
      if (typeof window.VMillAuth === "undefined" || !window.VMillAuth.isLoggedIn()) {
        location.replace("./login.html");
        return;
      }
      if (!window.VMillAuth.isAdmin()) {
        location.replace("./vmill_hub.html");
        return;
      }
      const $ = (id) => document.getElementById(id);
      const FIELDS = ["bg", "text", "accent", "headerBg", "headerText"];
      const PRESETS = {
        midnight: { name: "Midnight", bg: "#0a0f17", text: "#e6edf8", accent: "#57b4ff", headerBg: "#101521", headerText: "#e8e8e8" },
        forest: { name: "Forest", bg: "#0a120a", text: "#d8f1db", accent: "#42d18b", headerBg: "#0e1a10", headerText: "#dff3e3" },
        ember: { name: "Ember", bg: "#130b09", text: "#f5e2d4", accent: "#ff7a45", headerBg: "#24120d", headerText: "#ffe7d7" },
        steel: { name: "Steel", bg: "#10151c", text: "#e8eef8", accent: "#7ab6ff", headerBg: "#1a2430", headerText: "#eaf1ff" },
        light: { name: "Light", bg: "#edf1f7", text: "#1a2028", accent: "#2b7fff", headerBg: "#d8e0ec", headerText: "#1a2028" },
      };
      let savedTheme = null;
      let dirty = false;

      function tt(key, fallback = "", vars) {
        return window.VMillLang?.t ? window.VMillLang.t(key, fallback, vars) : fallback;
      }

      function applyTexts() {
        $("themeTitle").textContent = tt("theme.title", "Theme Studio");
        $("themeSub").textContent = tt("theme.subtitle", "Global theme module for Hub, Chrono, SPaCial and Camera.");
        $("resetBtn").textContent = tt("theme.resetDefault", "Reset Default");
        $("saveBtn").textContent = tt("theme.save", "Save Global Theme");
        $("presetTitle").textContent = tt("theme.presets", "Presets");
        $("paletteTitle").textContent = tt("theme.palette", "Palette");
        $("lblBgIn").textContent = tt("theme.field.bg", "Background");
        $("lblTextIn").textContent = tt("theme.field.text", "Text");
        $("lblAccentIn").textContent = tt("theme.field.accent", "Accent");
        $("lblHeaderBgIn").textContent = tt("theme.field.headerBg", "Header BG");
        $("lblHeaderTextIn").textContent = tt("theme.field.headerText", "Header Text");
        $("applyLiveBtn").textContent = tt("theme.applyLive", "Apply Live");
        $("previewTitle").textContent = tt("theme.preview", "Preview");
        $("pvHeadTitle").textContent = tt("theme.preview.header", "Header");
        $("pvHeadSub").textContent = tt("theme.title", "Theme Studio");
        $("pvBodyTitle").textContent = tt("theme.preview.surface", "Module Surface");
        $("pvBodySub").textContent = tt("theme.preview.desc", "This preview reflects the global theme variables.");
        $("pvBtnTxt").textContent = tt("theme.preview.action", "Accent Action");
      }

      function themeFromInputs() {
        return window.VMillTheme.normalizeTheme({
          name: "Custom",
          bg: $("bgIn").value,
          text: $("textIn").value,
          accent: $("accentIn").value,
          headerBg: $("headerBgIn").value,
          headerText: $("headerTextIn").value,
        });
      }

      function inputsFromTheme(theme) {
        $("bgIn").value = theme.bg;
        $("textIn").value = theme.text;
        $("accentIn").value = theme.accent;
        $("headerBgIn").value = theme.headerBg;
        $("headerTextIn").value = theme.headerText;
      }

      function toHex(v, fallback = "#000000") {
        const s = String(v || "").trim();
        return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback;
      }

      function hexToRgb(hex) {
        const h = toHex(hex);
        return {
          r: parseInt(h.slice(1, 3), 16),
          g: parseInt(h.slice(3, 5), 16),
          b: parseInt(h.slice(5, 7), 16),
        };
      }

      function rgbaFromHex(hex, alpha = 1) {
        const c = hexToRgb(hex);
        const a = Math.max(0, Math.min(1, Number(alpha) || 1));
        return `rgba(${c.r}, ${c.g}, ${c.b}, ${a})`;
      }

      function toRgbCsv(hex) {
        const c = hexToRgb(hex);
        return `${c.r},${c.g},${c.b}`;
      }

      function sameTheme(a, b) {
        if (!a || !b) return false;
        return FIELDS.every((k) => String(a[k] || "").toLowerCase() === String(b[k] || "").toLowerCase());
      }

      function syncDirtyUi() {
        const draft = themeFromInputs();
        dirty = !sameTheme(draft, savedTheme);
        const saveBtn = $("saveBtn");
        if (saveBtn) saveBtn.disabled = !dirty;
      }

      function applyPreview(theme) {
        document.documentElement.style.setProperty("--bg", theme.bg);
        document.documentElement.style.setProperty("--text", theme.text);
        document.documentElement.style.setProperty("--accent", theme.accent);
        document.documentElement.style.setProperty("--accent-rgb", toRgbCsv(theme.accent));
        document.documentElement.style.setProperty("--panel", theme.bg);
        document.documentElement.style.setProperty("--panel2", theme.bg);
        document.documentElement.style.setProperty("--border", rgbaFromHex(theme.text, .18));
        document.documentElement.style.setProperty("--muted", rgbaFromHex(theme.text, .65));
        document.documentElement.style.setProperty("--header-bg", theme.headerBg);
        document.documentElement.style.setProperty("--header-text", theme.headerText);
      }

      function setStatus(msg) { $("status").textContent = msg; }

      function notifyDirtyState() {
        window.__vmThemeStudioDirty = dirty;
        try {
          window.parent?.postMessage({ type: "vmill:theme-studio-dirty", dirty }, location.origin);
        } catch {}
      }

      function saveChanges() {
        const draft = themeFromInputs();
        savedTheme = window.VMillTheme.writeTheme(draft, "theme-studio-save");
        window.VMillTheme.applyTheme(document, "theme", savedTheme);
        inputsFromTheme(savedTheme);
        applyPreview(savedTheme);
        syncDirtyUi();
        notifyDirtyState();
        setStatus(tt("theme.status.saved", "Theme saved."));
        return savedTheme;
      }

      function discardChanges() {
        if (!savedTheme) savedTheme = window.VMillTheme.readTheme();
        inputsFromTheme(savedTheme);
        applyPreview(savedTheme);
        if (window.VMillTheme.previewTheme) window.VMillTheme.previewTheme(savedTheme, "theme-studio-discard");
        window.VMillTheme.applyTheme(document, "theme", savedTheme);
        syncDirtyUi();
        notifyDirtyState();
        setStatus(tt("theme.status.discarded", "Changes discarded."));
      }

      function confirmLeaveIfDirty() {
        if (!dirty) return true;
        const save = window.confirm(tt("theme.confirm.unsaved", "Theme changes are not saved. OK = Save, Cancel = Discard."));
        if (save) saveChanges();
        else discardChanges();
        return true;
      }

      function renderPresets() {
        const box = $("presetRow");
        box.innerHTML = "";
        for (const key of Object.keys(PRESETS)) {
          const p = PRESETS[key];
          const el = document.createElement("button");
          el.type = "button";
          el.className = "preset";
          el.innerHTML = `
            <div class="name">${p.name}</div>
            <div class="chips">
              <span class="chip" style="background:${p.bg}"></span>
              <span class="chip" style="background:${p.text}"></span>
              <span class="chip" style="background:${p.accent}"></span>
              <span class="chip" style="background:${p.headerBg}"></span>
            </div>
          `;
          el.addEventListener("click", () => {
            const next = window.VMillTheme.normalizeTheme({ ...p, name: p.name });
            savedTheme = window.VMillTheme.writeTheme(next, "theme-studio-preset");
            window.VMillTheme.applyTheme(document, "theme", savedTheme);
            inputsFromTheme(next);
            applyPreview(savedTheme);
            syncDirtyUi();
            notifyDirtyState();
            setStatus(tt("theme.status.presetSaved", "Preset saved: {name}", { name: p.name }));
          });
          box.appendChild(el);
        }
      }

      function applyLiveToAll() {
        const draft = themeFromInputs();
        window.VMillTheme.applyTheme(document, "theme", draft);
        if (window.VMillTheme.previewTheme) window.VMillTheme.previewTheme(draft, "theme-studio-live");
        syncDirtyUi();
        notifyDirtyState();
        setStatus(dirty
          ? tt("theme.status.liveUnsaved", "Live preview (not saved).")
          : tt("theme.status.matches", "Theme matches saved config."));
      }

      $("saveBtn").addEventListener("click", saveChanges);
      $("applyLiveBtn").addEventListener("click", applyLiveToAll);
      $("resetBtn").addEventListener("click", () => {
        const d = window.VMillTheme.defaultTheme();
        inputsFromTheme(d);
        applyPreview(d);
        syncDirtyUi();
        notifyDirtyState();
        setStatus(tt("theme.status.defaultLoaded", "Default loaded (not saved)."));
      });

      ["bgIn","textIn","accentIn","headerBgIn","headerTextIn"].forEach((id) => {
        $(id).addEventListener("input", () => {
          const draft = themeFromInputs();
          applyPreview(draft);
          syncDirtyUi();
          notifyDirtyState();
          setStatus(dirty
            ? tt("theme.status.unsaved", "Unsaved changes.")
            : tt("theme.status.matches", "Theme matches saved config."));
        });
      });

      window.addEventListener("vmill:theme:changed", (e) => {
        const persisted = e?.detail?.persisted !== false;
        const t = window.VMillTheme.normalizeTheme(e?.detail?.theme || window.VMillTheme.readTheme());
        if (persisted) {
          savedTheme = t;
          if (!dirty || String(e?.detail?.source || "").startsWith("theme-studio")) {
            inputsFromTheme(t);
            applyPreview(t);
          }
          syncDirtyUi();
          notifyDirtyState();
        }
      });

      savedTheme = window.VMillTheme.readTheme();
      inputsFromTheme(savedTheme);
      applyTexts();
      setStatus(tt("i18n.status.ready", "Ready."));
      renderPresets();
      applyPreview(savedTheme);
      syncDirtyUi();
      notifyDirtyState();
      window.VMillTheme.applyTheme(document, "theme", savedTheme);
      window.addEventListener("vmill:lang:changed", applyTexts);
      window.addEventListener("vmill:lang:catalog:changed", applyTexts);

      window.VMillThemeStudio = {
        hasUnsavedChanges: () => !!dirty,
        saveChanges,
        discardChanges,
        confirmLeaveIfDirty,
      };

      window.addEventListener("beforeunload", (e) => {
        if (!dirty) return;
        e.preventDefault();
        e.returnValue = "";
      });
    })();
  </script>
</body>
</html>
