<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VMill</title>
  </head>
  <body>
    <script>
      (function () {
        var token = "";
        var offline = false;
        try {
          token = String(localStorage.getItem("vmill:auth:token") || "");
          offline = String(localStorage.getItem("vmill:offline-mode") || "") === "1";
        } catch (e) {}
        var target = (token || offline) ? "/vmill_hub.html" : "/login.html";
        location.replace(target);
      })();
    </script>
    <noscript>
      <p>VMill requires JavaScript. Open <a href="/login.html">Login</a>.</p>
    </noscript>
  </body>
</html>
