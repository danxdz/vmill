services:
  - type: web
    name: vmill-api
    runtime: python
    plan: starter
    branch: main
    rootDir: .
    startCommand: python vmill_server.py
    autoDeploy: true
    envVars:
      - key: VMILL_DB_PATH
        value: /var/data/vmill.db
    disk:
      name: vmill-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: vmill-ocr
    runtime: python
    plan: starter
    branch: main
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -r requirements_ocr.txt
    startCommand: python ocr_server.py
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: ENVIRONMENT
        value: production
